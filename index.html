<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Z — Chitti Management</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#080810;--bg2:#0e0e1c;--bgc:#111120;--bgch:#16162a;--bgi:#0a0a18;
  --g:#f0b429;--gl:#ffd166;--gd:#c88a00;--am:#ff9f1c;
  --em:#06d6a0;--emd:#04a87e;--rb:#ef233c;--rbd:#c01831;
  --sa:#4895ef;--vi:#b185db;--ro:#ff6b9d;--tl:#2ec4b6;
  --tp:#f0e6ce;--ts:#8a7560;--tm:#3a3020;
  --bd:rgba(240,180,41,.18);--bdb:rgba(240,180,41,.55);
  --sg:0 0 24px rgba(240,180,41,.12);--sgl:0 0 48px rgba(240,180,41,.22);
  --r:14px;--rs:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',sans-serif;background:var(--bg);color:var(--tp);min-height:100vh;
  background-image:
    radial-gradient(ellipse 60% 40% at 10% 10%,rgba(240,180,41,.05) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 90%,rgba(255,159,28,.04) 0%,transparent 60%);
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--gd);border-radius:3px}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideR{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-100%)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes checkPop{0%{transform:scale(0)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.fia{animation:fadeIn .3s ease forwards}
.sra{animation:slideR .25s ease forwards}

/* Header */
.hdr{position:sticky;top:0;z-index:200;background:rgba(8,8,16,.94);backdrop-filter:blur(24px);border-bottom:1px solid var(--bd);padding:0 24px;height:64px;display:flex;align-items:center}
.hdr-in{max-width:1440px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{display:flex;align-items:center;gap:12px;cursor:pointer}
.logo-b{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--g),var(--am));display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:900;color:#080810;box-shadow:0 0 18px rgba(240,180,41,.45);flex-shrink:0}
.logo-n{font-size:16px;font-weight:800;letter-spacing:.8px;background:linear-gradient(90deg,var(--gl),var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1}
.logo-t{font-size:10px;color:var(--ts);letter-spacing:.4px;margin-top:1px}
.hdr-a{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hdr-left{display:flex;align-items:center;gap:12px}

/* Hamburger */
.ham-btn{
  width:40px;height:40px;border-radius:10px;border:1px solid var(--bd);
  background:transparent;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:5px;transition:all .2s;flex-shrink:0;
}
.ham-btn:hover{background:var(--bgc);border-color:var(--bdb)}
.ham-line{width:18px;height:2px;background:var(--g);border-radius:2px;transition:all .2s}

/* Sidebar */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;backdrop-filter:blur(3px);animation:fadeIn .2s ease}
.sidebar{
  position:fixed;left:0;top:0;bottom:0;width:280px;z-index:400;
  background:var(--bg2);border-right:1px solid var(--bdb);
  display:flex;flex-direction:column;animation:slideInLeft .25s ease;
  overflow-y:auto;
}
.sidebar-head{
  padding:20px 20px 16px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;
}
.sidebar-logo{display:flex;align-items:center;gap:10px}
.sidebar-logo-b{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--g),var(--am));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#080810}
.sidebar-logo-n{font-size:14px;font-weight:800;background:linear-gradient(90deg,var(--gl),var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--bd);background:transparent;cursor:pointer;color:var(--ts);font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.sidebar-close:hover{background:var(--bgc);color:var(--tp)}
.sidebar-nav{padding:12px 12px;flex:1;display:flex;flex-direction:column;gap:4px}
.sidebar-item{
  display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;
  cursor:pointer;transition:all .2s;border:1px solid transparent;
  font-size:14px;font-weight:600;color:var(--ts);background:transparent;
  font-family:'Inter',sans-serif;text-align:left;width:100%;
}
.sidebar-item:hover{background:var(--bgch);color:var(--tp);border-color:var(--bd)}
.sidebar-item.active{background:rgba(240,180,41,.1);color:var(--g);border-color:rgba(240,180,41,.25)}
.sidebar-item-icon{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.sidebar-divider{height:1px;background:var(--bd);margin:8px 0}
.sidebar-section-label{font-size:10px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:1.5px;padding:6px 14px 4px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:10px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;transition:all .2s;letter-spacing:.2px;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}.btn:active{transform:translateY(0)}
.btn-g{background:linear-gradient(135deg,var(--g),var(--am));color:#080810;box-shadow:0 4px 14px rgba(240,180,41,.32)}
.btn-g:hover{box-shadow:0 6px 24px rgba(240,180,41,.5)}
.btn-e{background:linear-gradient(135deg,var(--em),var(--emd));color:#080810;box-shadow:0 4px 14px rgba(6,214,160,.28)}
.btn-e:hover{box-shadow:0 6px 24px rgba(6,214,160,.5)}
.btn-r{background:linear-gradient(135deg,var(--rb),var(--rbd));color:#fff;box-shadow:0 4px 14px rgba(239,35,60,.28)}
.btn-r:hover{box-shadow:0 6px 24px rgba(239,35,60,.48)}
.btn-gh{background:transparent;color:var(--ts);border:1px solid var(--bd)}
.btn-gh:hover{background:var(--bgc);color:var(--tp);border-color:var(--bdb)}
.btn-o{background:transparent;color:var(--g);border:1px solid var(--bdb)}
.btn-o:hover{background:rgba(240,180,41,.08)}
.btn-w{background:linear-gradient(135deg,#25d366,#128c7e);color:#fff;box-shadow:0 4px 14px rgba(37,211,102,.28)}
.btn-w:hover{box-shadow:0 6px 24px rgba(37,211,102,.5)}
.btn-sa{background:linear-gradient(135deg,var(--sa),#3a7bd5);color:#fff;box-shadow:0 4px 14px rgba(72,149,239,.28)}
.btn-sa:hover{box-shadow:0 6px 24px rgba(72,149,239,.48)}
.btn-sm{padding:7px 13px;font-size:12px;border-radius:8px}
.btn-xs{padding:5px 10px;font-size:11px;border-radius:6px}
.btn-f{width:100%;justify-content:center;padding:13px;font-size:14px}
.btn-dis{opacity:.45;pointer-events:none}

/* Cards */
.crd{background:var(--bgc);border:1px solid var(--bd);border-radius:var(--r);padding:22px;transition:border-color .2s,box-shadow .2s}
.crd:hover{border-color:rgba(240,180,41,.32);box-shadow:var(--sg)}
.crd-g{border-color:rgba(240,180,41,.35)}.crd-e{border-color:rgba(6,214,160,.3)}
.crd-r{border-color:rgba(239,35,60,.3)}.crd-s{border-color:rgba(72,149,239,.3)}
.crd-v{border-color:rgba(177,133,219,.3)}.crd-ro{border-color:rgba(255,107,157,.3)}

/* Stat Card */
.sc{background:var(--bgc);border-radius:var(--r);padding:22px 20px;position:relative;overflow:hidden;transition:transform .25s,box-shadow .25s;cursor:default}
.sc::after{content:'';position:absolute;inset:0;border-radius:var(--r);border:1px solid transparent;background:var(--grad) border-box;-webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude}
.sc:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.5)}
.sc-gl{position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;filter:blur(35px);opacity:.3}

/* Member Card */
.mc{background:var(--bgc);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--g),var(--am));border-radius:0 2px 2px 0}
.mc:hover{border-color:var(--bdb);box-shadow:var(--sg);transform:translateX(3px) translateY(-1px);background:var(--bgch)}
.mc-av{width:48px;height:48px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,rgba(240,180,41,.15),rgba(255,159,28,.08));border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:var(--g)}
.mc-nm{font-size:17px;font-weight:800;line-height:1.2;background:linear-gradient(90deg,var(--gl),var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.mc-sub{font-size:11px;color:var(--ts);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.mc-rt{margin-left:auto;display:flex;gap:12px;align-items:center;flex-shrink:0}
.ab{text-align:right}.ab-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;opacity:.65}.ab-v{font-size:14px;font-weight:800;line-height:1.2}

/* Badges */
.bdg{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px}
.bdg-a{background:rgba(6,214,160,.12);color:var(--em);border:1px solid rgba(6,214,160,.25)}
.bdg-q{background:rgba(100,100,100,.15);color:#777;border:1px solid rgba(100,100,100,.25)}
.bdg-p{background:rgba(6,214,160,.12);color:var(--em);border:1px solid rgba(6,214,160,.25)}
.bdg-pt{background:rgba(240,180,41,.12);color:var(--g);border:1px solid rgba(240,180,41,.25)}
.bdg-u{background:rgba(239,35,60,.12);color:var(--rb);border:1px solid rgba(239,35,60,.25)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dot-a{background:var(--em);box-shadow:0 0 6px rgba(6,214,160,.7)}.dot-q{background:#555}

/* Search */
.swrp{position:relative}
.sico{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--ts);pointer-events:none}
.sinp{width:100%;padding:14px 16px 14px 48px;background:var(--bgc);border:1.5px solid var(--bd);border-radius:12px;color:var(--tp);font-family:'Inter',sans-serif;font-size:15px;outline:none;transition:all .2s}
.sinp::placeholder{color:var(--tm)}.sinp:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(240,180,41,.12),var(--sg)}

/* Tabs */
.tabs{display:flex;gap:3px;background:var(--bg2);border-radius:11px;padding:4px;border:1px solid var(--bd)}
.tab{flex:1;padding:9px 14px;border-radius:8px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;background:transparent;color:var(--ts);transition:all .2s;white-space:nowrap}
.tab.on{background:linear-gradient(135deg,var(--g),var(--am));color:#080810;box-shadow:0 2px 10px rgba(240,180,41,.3)}

/* Forms */
.fg{margin-bottom:18px}
.fl{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--ts);margin-bottom:7px}
.fi{width:100%;padding:11px 14px;background:var(--bgi);border:1.5px solid var(--bd);border-radius:10px;color:var(--tp);font-family:'Inter',sans-serif;font-size:14px;outline:none;transition:all .2s}
.fi::placeholder{color:var(--tm)}.fi:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(240,180,41,.1)}
.fi.er{border-color:var(--rb)}.fi-e{font-size:11px;color:var(--rb);margin-top:4px}
.fi-ta{min-height:90px;resize:vertical}
.fi-ta-lg{min-height:180px;resize:vertical}
.fsec{background:var(--bg2);border-radius:12px;padding:20px;border:1px solid var(--bd);margin-bottom:18px}
.fsec-t{font-size:12px;font-weight:700;color:var(--g);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.crow{display:grid;grid-template-columns:90px 1fr auto;gap:10px;align-items:end;margin-bottom:10px}

/* Grids */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:700px){
  .g4,.g3,.g2{grid-template-columns:1fr}
  .mc-rt{display:none}
  .hdr{padding:0 12px}
  .pg{padding:16px 12px!important}
  .crow{grid-template-columns:70px 1fr auto}
  .hdr-a{gap:6px}
  .sidebar{width:260px}
}

/* Info rows */
.ir{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid rgba(240,180,41,.08)}.ir:last-child{border-bottom:none}
.ir-i{font-size:16px;width:24px;text-align:center;flex-shrink:0;margin-top:1px}
.ir-l{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--ts)}
.ir-v{font-size:14px;font-weight:600;color:var(--tp);margin-top:2px}

/* Page */
.pg{padding:28px 24px;max-width:1440px;margin:0 auto;animation:fadeIn .3s ease}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.sh-t{font-size:17px;font-weight:700}.sh-t span{color:var(--g)}

/* Overlay/Modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.84);display:flex;align-items:center;justify-content:center;z-index:500;padding:20px;backdrop-filter:blur(6px);animation:fadeIn .2s ease}
.mdl{background:var(--bgc);border:1px solid var(--bdb);border-radius:18px;padding:28px;max-width:500px;width:100%;box-shadow:0 24px 64px rgba(0,0,0,.7),var(--sgl);animation:fadeIn .25s ease;max-height:90vh;overflow-y:auto}
.mdl-lg{max-width:640px}
.mdl-t{font-size:19px;font-weight:800;margin-bottom:10px}
.mdl-tx{font-size:13px;color:var(--ts);margin-bottom:22px;line-height:1.65}
.mdl-a{display:flex;gap:10px}

/* Table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:10px 12px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--g);border-bottom:1px solid var(--bd);background:var(--bg2);white-space:nowrap}
.tbl td{padding:12px;border-bottom:1px solid rgba(240,180,41,.06);font-size:13px;vertical-align:middle}
.tbl tr:hover td{background:var(--bgch)}
.tbw{overflow-x:auto;border-radius:10px}

/* Select */
.msel{padding:9px 14px;background:var(--bgc);border:1.5px solid var(--bd);border-radius:10px;color:var(--tp);font-family:'Inter',sans-serif;font-size:13px;outline:none;cursor:pointer}
.msel:focus{border-color:var(--g)}.msel option{background:var(--bgc)}

/* Text */
.tg{color:var(--g)}.tgg{background:linear-gradient(90deg,var(--gl),var(--am));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.te{color:var(--em)}.tr2{color:var(--rb)}.ts2{color:var(--sa)}.tv{color:var(--vi)}.tro{color:var(--ro)}.ttl{color:var(--tl)}
.bn{font-size:34px;font-weight:900;line-height:1;filter:drop-shadow(0 0 6px currentColor)}

/* Empty */
.emp{text-align:center;padding:48px 20px;color:var(--ts)}
.emp-i{font-size:48px;margin-bottom:14px;opacity:.45}
.emp-t{font-size:15px;font-weight:600}
.emp-s{font-size:12px;margin-top:5px;opacity:.7}

/* Notification */
.ntf{position:fixed;bottom:22px;right:22px;z-index:9999;padding:13px 18px;border-radius:11px;font-size:13px;font-weight:600;box-shadow:0 8px 28px rgba(0,0,0,.55);animation:slideR .3s ease;display:flex;align-items:center;gap:9px;max-width:360px}
.ntf-s{background:var(--emd);color:#fff}.ntf-e{background:var(--rbd);color:#fff}.ntf-i{background:var(--gd);color:#fff}

/* Back */
.bk{display:inline-flex;align-items:center;gap:7px;color:var(--ts);font-size:13px;cursor:pointer;border:none;background:none;font-family:'Inter',sans-serif;transition:color .2s;padding:7px 0}
.bk:hover{color:var(--g)}

/* Count pill */
.cp{display:inline-flex;align-items:center;justify-content:center;background:rgba(240,180,41,.15);color:var(--g);font-size:11px;font-weight:700;border-radius:20px;padding:1px 7px;margin-left:5px}

/* Checkbox */
.chk{width:20px;height:20px;border-radius:6px;border:2px solid var(--bd);background:var(--bgi);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.chk.on{background:var(--g);border-color:var(--g)}
.chk.on::after{content:'✓';color:#080810;font-size:13px;font-weight:800;animation:checkPop .3s ease}
.chk:hover{border-color:var(--g)}

/* Reminder list item */
.rem-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--bg2);border-radius:10px;border:1px solid var(--bd);transition:all .15s;cursor:pointer}
.rem-item:hover{border-color:var(--bdb);background:var(--bgch)}
.rem-item.sel{border-color:rgba(37,211,102,.4);background:rgba(37,211,102,.04)}

/* Sending indicator */
.sending{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(37,211,102,.08);border-radius:10px;border:1px solid rgba(37,211,102,.2);margin-bottom:12px;font-size:13px;color:var(--em)}
.sending-dot{width:8px;height:8px;border-radius:50%;background:var(--em);animation:pulse 1s infinite}

/* Chitti period badge */
.period-badge{
  display:inline-flex;align-items:center;
  padding:2px 7px;border-radius:5px;
  font-size:10px;font-weight:600;
  background:rgba(72,149,239,.12);color:var(--sa);
  border:1px solid rgba(72,149,239,.2);
  white-space:nowrap;margin-left:6px;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useCallback,useRef}=React;

/* ── Helpers ── */
const fmt=n=>'₹'+Number(n||0).toLocaleString('en-IN');
const cap=s=>s?s.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' '):'';
const ini=n=>n?n.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2):'?';
const curM=()=>new Date().toISOString().slice(0,7);
const mLbl=ym=>{const[y,m]=ym.split('-');return new Date(y,m-1,1).toLocaleString('en',{month:'long',year:'numeric'})};

/* ── Chitti Period Map (Part 5) ── */
const CHITTI_PERIODS={
  '3':'DEC24-JUL26',
  '4':'APR25-Ongoing',
  '5':'MAY25-Ongoing',
  '6':'SEP25-APR27',
  '8':'FEB25-Ongoing',
  '10':'JAN25-AUG26',
  '11':'JUN25-JAN27',
  '12':'JUL25-FEB27',
  '13':'AUG25-MAR27',
  '14':'NOV25-JUN27',
  '15':'DEC25-JUL27',
  '16':'JAN26-AUG27',
  '17':'MAR26-OCT27',
  '18':'APR26-NOV27',
  '19':'MAY26-DEC27',
  '20':'JUN26-JAN28',
};

/* Get period string for a chitti number — handles variants like "3a","3b","10a" etc */
function getChittiPeriod(chittiNumber){
  const raw=String(chittiNumber);
  // strip trailing letters to get base number
  const base=raw.replace(/[a-zA-Z\-]/g,'').trim();
  return CHITTI_PERIODS[base]||null;
}

/* Format chitti number with period for messages (Part 6) */
function fmtChittiLabel(chittiNumber){
  const period=getChittiPeriod(chittiNumber);
  if(period) return `Chitti #${chittiNumber} (${period})`;
  return `Chitti #${chittiNumber}`;
}

/* ── Default reminder message template ── */
const DEFAULT_REMINDER_TEMPLATE=`Dear {name},

Assalamu Alaikum! I hope this message finds you well.

Here are your payment details for the Chitti:

{chittiLines}

/* ── Build reminder message (Parts 4 & 6) ── */
function buildReminderMsg(member, chittis, rd){
  const mc=chittis.filter(c=>c.memberId===member.id);
  const mr=rd.filter(r=>r.memberId===member.id);
  const cTotal=mc.reduce((s,c)=>s+Number(c.amount),0);
  const rTotal=mr.reduce((s,r)=>s+Number(r.amount),0);
  const total=cTotal+rTotal;

  // Chitti lines WITH period (Part 6)
  const chittiLines=mc.map(c=>`  🎟 ${fmtChittiLabel(c.chittiNumber)}: ${fmt(c.amount)}`).join('\n');
  const rdLine=mr.length?`\n  💳 RD (Monthly): ${fmt(rTotal)}`:'';
  const allLines=chittiLines+(rdLine||'');

  // Check for saved custom template (Part 4)
  const savedTemplate=DB.getReminderTemplate();
  if(savedTemplate&&savedTemplate.trim()){
    // Replace placeholders in custom template
    return savedTemplate
      .replace(/{name}/g,cap(member.name))
      .replace(/{chittiLines}/g,allLines)
      .replace(/{total}/g,fmt(total));
  }

  // Default message (existing logic preserved, only chitti label updated)
  return `Dear ${cap(member.name)},\n\nAssalamu Alaikum! I hope this message finds you well.\n\nHere are your payment details for the Chitti:\n\n${chittiLines}${rdLine}\n\n📊 Total Amount Due: ${fmt(total)}\n\nKindly arrange the payment at your earliest convenience.\n\nJazakAllahu Khairan!\n\nBest regards,\nZ — Chitti Management`;
}

}

/* ── Reminder Modal (updated to use buildReminderMsg) ── */
function ReminderModal({onClose,notify}){
  const members=DB.g('members').filter(m=>m.status==='active');
  const chittis=DB.g('chittis');
  const rd=DB.g('rdEntries');
  const payments=DB.g('payments');
  const cMonth=curM();

  const withPhone=members.filter(m=>m.phone&&m.phone.replace(/\D/g,'').length>=10);
  const [selected,setSel]=useState(new Set(withPhone.map(m=>m.id)));
  const [sending,setSending]=useState(false);
  const [sent,setSent]=useState(new Set());
  const [search,setSearch]=useState('');

  const ct=mId=>chittis.filter(c=>c.memberId===mId).reduce((s,c)=>s+Number(c.amount),0);
  const rt=mId=>rd.filter(r=>r.memberId===mId).reduce((s,r)=>s+Number(r.amount),0);
  const isPaid=mId=>{const p=payments.find(pp=>pp.memberId===mId&&pp.month===cMonth);return p&&p.status==='paid'};

  const unpaidWithPhone=withPhone.filter(m=>!isPaid(m.id));

  const toggle=id=>{
    setSel(prev=>{const n=new Set(prev);if(n.has(id))n.delete(id);else n.add(id);return n});
  };
  const selectAll=()=>setSel(new Set(withPhone.map(m=>m.id)));
  const selectNone=()=>setSel(new Set());
  const selectUnpaid=()=>setSel(new Set(unpaidWithPhone.map(m=>m.id)));

  const filteredMembers=useMemo(()=>{
    const lq=search.toLowerCase().trim();
    if(!lq)return withPhone;
    return withPhone.filter(m=>m.name.toLowerCase().includes(lq)||(m.nickname||'').toLowerCase().includes(lq)||(m.location||'').toLowerCase().includes(lq));
  },[withPhone,search]);

  const sendReminders=async()=>{
    const toSend=[...selected].map(id=>withPhone.find(m=>m.id===id)).filter(Boolean);
    if(!toSend.length)return;
    setSending(true);
    for(let i=0;i<toSend.length;i++){
      const m=toSend[i];
      const ph=m.phone.replace(/\D/g,'');
      // Use unified message builder (Parts 4 & 6)
      const msg=buildReminderMsg(m,chittis,rd);
      window.open(`https://wa.me/91${ph}?text=${encodeURIComponent(msg)}`,'_blank');
      setSent(prev=>new Set([...prev,m.id]));
      if(i<toSend.length-1)await new Promise(r=>setTimeout(r,1500));
    }
    setSending(false);
    notify({t:'success',m:`Opened WhatsApp for ${toSend.length} member${toSend.length>1?'s':''}!`});
  };

  const noPhoneMembers=members.filter(m=>!m.phone||m.phone.replace(/\D/g,'').length<10);

  return(<div className="ov" onClick={onClose}><div className="mdl mdl-lg" onClick={e=>e.stopPropagation()}>
    <div className="mdl-t">📢 Send Payment Reminders</div>
    <p style={{fontSize:13,color:'var(--ts)',marginBottom:16,lineHeight:1.6}}>
      Select members to send WhatsApp reminders. Chitti periods are included automatically.
    </p>
    <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
      <button className="btn btn-g btn-xs" onClick={selectAll}>All ({withPhone.length})</button>
      <button className="btn btn-sa btn-xs" onClick={selectUnpaid}>Unpaid ({unpaidWithPhone.length})</button>
      <button className="btn btn-gh btn-xs" onClick={selectNone}>Deselect All</button>
    </div>
    <div className="swrp" style={{marginBottom:14}}>
      <span className="sico">🔍</span>
      <input className="sinp" style={{padding:'10px 14px 10px 42px',fontSize:13}} placeholder="Search members…" value={search} onChange={e=>setSearch(e.target.value)}/>
    </div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,fontSize:13}}>
      <span style={{color:'var(--ts)'}}>📱 {withPhone.length} with phone | <span style={{color:'var(--g)',fontWeight:700}}>{selected.size} selected</span></span>
      {noPhoneMembers.length>0&&<span style={{color:'var(--rb)',fontSize:11}}>{noPhoneMembers.length} without phone</span>}
    </div>
    <div style={{maxHeight:'40vh',overflowY:'auto',display:'flex',flexDirection:'column',gap:6,marginBottom:18,paddingRight:4}}>
      {filteredMembers.length===0?<div className="emp" style={{padding:30}}><div className="emp-t">No members with phone numbers</div></div>
      :filteredMembers.map(m=>{
        const isOn=selected.has(m.id);
        const isSent=sent.has(m.id);
        const paid=isPaid(m.id);
        const total=ct(m.id)+rt(m.id);
        return(
          <div key={m.id} className={`rem-item ${isOn?'sel':''}`} onClick={()=>!sending&&toggle(m.id)}>
            <div className={`chk ${isOn?'on':''}`}></div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                <span style={{fontWeight:700,fontSize:14,color:isOn?'var(--g)':'var(--tp)'}}>{cap(m.name)}</span>
                {m.location&&<span style={{fontSize:11,color:'var(--ts)'}}>📍{m.location}</span>}
                {paid&&<span className="bdg bdg-p" style={{fontSize:9}}>Paid</span>}
                {isSent&&<span className="bdg bdg-a" style={{fontSize:9}}>✅ Sent</span>}
              </div>
              <div style={{fontSize:11,color:'var(--ts)',marginTop:2}}>
                📞 {m.phone} · Total: <span style={{color:'var(--g)',fontWeight:600}}>{fmt(total)}</span>
              </div>
            </div>
          </div>
        );
      })}
    </div>
    {sending&&(
      <div className="sending">
        <div className="sending-dot"></div>
        <span>Opening WhatsApp… ({sent.size}/{selected.size} done)</span>
      </div>
    )}
    <div className="mdl-a">
      <button className="btn btn-gh btn-f" onClick={onClose} disabled={sending}>Close</button>
      <button className={`btn btn-w btn-f ${selected.size===0||sending?'btn-dis':''}`} onClick={sendReminders}>
        💬 Send to {selected.size} Member{selected.size!==1?'s':''}
      </button>
    </div>
    {noPhoneMembers.length>0&&(
      <details style={{marginTop:14}}>
        <summary style={{fontSize:12,color:'var(--ts)',cursor:'pointer'}}>⚠️ {noPhoneMembers.length} without phone</summary>
        <div style={{marginTop:8,display:'flex',flexWrap:'wrap',gap:6}}>
          {noPhoneMembers.map(m=><span key={m.id} style={{fontSize:11,padding:'3px 8px',background:'rgba(239,35,60,.08)',border:'1px solid rgba(239,35,60,.2)',borderRadius:6,color:'var(--rb)'}}>{cap(m.name)}</span>)}
        </div>
      </details>
    )}
  </div></div>);
}

/* ── Dashboard ── */
function Dash({nav,notify}){
  const [members,setM]=useState([]);
  const [chittis,setC]=useState([]);
  const [rd,setR]=useState([]);
  const [payments,setP]=useState([]);
  const [q,setQ]=useState('');
  const [tab,setTab]=useState('active');

  useEffect(()=>{
    const sync=()=>{setM(DB.g('members'));setC(DB.g('chittis'));setR(DB.g('rdEntries'));setP(DB.g('payments'))};
    sync();window.addEventListener('focus',sync);window.addEventListener('storage',sync);
    return()=>{window.removeEventListener('focus',sync);window.removeEventListener('storage',sync)};
  },[]);

  const ct=mId=>chittis.filter(c=>c.memberId===mId).reduce((s,c)=>s+Number(c.amount),0);
  const rt=mId=>rd.filter(r=>r.memberId===mId).reduce((s,r)=>s+Number(r.amount),0);
  const active=members.filter(m=>m.status==='active');
  const c=curM();
  const grand=active.reduce((s,m)=>s+ct(m.id)+rt(m.id),0);
  const coll=payments.filter(p=>p.month===c).reduce((s,p)=>s+Number(p.chittiAmount||0)+Number(p.rdAmount||0),0);
  const paidN=active.filter(m=>{const p=payments.find(pp=>pp.memberId===m.id&&pp.month===c);return p&&p.status==='paid'}).length;

  const filtered=useMemo(()=>{
    const lq=q.toLowerCase().trim();
    return members.filter(m=>{
      if(tab==='active'?m.status!=='active':m.status!=='quit')return false;
      if(!lq)return true;
      return m.name.toLowerCase().includes(lq)||(m.nickname||'').toLowerCase().includes(lq)||(m.location||'').toLowerCase().includes(lq);
    });
  },[members,q,tab]);

  return(<div className="pg">
    <div className="g4" style={{marginBottom:26}}>
      <SC icon="👥" label="Active Members" value={active.length} sub={`${members.filter(m=>m.status==='quit').length} past`} c="#f0b429"/>
      <SC icon="💰" label="Total Portfolio" value={fmt(grand)} sub="All chittis + RD" c="#4895ef"/>
      <SC icon="✅" label="Collected" value={fmt(coll)} sub={mLbl(c)} c="#06d6a0"/>
      <SC icon="⚠️" label="Pending" value={active.length-paidN} sub={`${paidN} paid`} c="#ef233c"/>
    </div>
    <div className="crd">
      <div className="sh">
        <div className="sh-t">Members <span>Directory</span><span className="cp">{filtered.length}</span></div>
        <button className="btn btn-g btn-sm" onClick={()=>nav('add')}>＋ Add</button>
      </div>
      <div className="swrp" style={{marginBottom:14}}>
        <span className="sico">🔍</span>
        <input className="sinp" placeholder="Search by name, nickname, or location…" value={q} onChange={e=>setQ(e.target.value)}/>
      </div>
      <div className="tabs" style={{marginBottom:16}}>
        <button className={`tab ${tab==='active'?'on':''}`} onClick={()=>setTab('active')}>🟢 Active<span className="cp">{members.filter(m=>m.status==='active').length}</span></button>
        <button className={`tab ${tab==='quit'?'on':''}`} onClick={()=>setTab('quit')}>⚫ Past<span className="cp">{members.filter(m=>m.status==='quit').length}</span></button>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {filtered.length===0?<div className="emp"><div className="emp-i">🔎</div><div className="emp-t">{q?'No results':'No members'}</div></div>
        :filtered.map((m,i)=>{const tc=ct(m.id),tr2=rt(m.id);return(
          <div key={m.id} className="mc sra" style={{animationDelay:`${Math.min(i*12,180)}ms`}} onClick={()=>nav('detail',m.id)}>
            <div className="mc-av">{ini(m.name)}</div>
            <div style={{flex:1,minWidth:0}}>
              <div className="mc-nm">{cap(m.name)}</div>
              <div className="mc-sub">
                {m.location&&<span>📍{m.location}</span>}
                {m.nickname&&<span className="ttl">"{m.nickname}"</span>}
                <span className={`bdg bdg-${m.status==='active'?'a':'q'}`}><span className={`dot dot-${m.status==='active'?'a':'q'}`}></span>{m.status==='active'?'Active':'Quit'}</span>
              </div>
            </div>
            <div className="mc-rt">
              {tc>0&&<div className="ab"><div className="ab-l tg">Chitti</div><div className="ab-v tg">{fmt(tc)}</div></div>}
              {tr2>0&&<div className="ab"><div className="ab-l tv">RD</div><div className="ab-v tv">{fmt(tr2)}</div></div>}
              <div className="ab"><div className="ab-l tro">Total</div><div className="ab-v tro">{fmt(tc+tr2)}</div></div>
            </div>
          </div>
        )})}
      </div>
    </div>
  </div>);
}

/* ── Member Form ── */
function MForm({memberId,nav,notify}){
  const isE=!!memberId;
  const [f,sF]=useState({name:'',nickname:'',phone:'',location:'',notes:'',status:'active'});
  const [ch,sCh]=useState([{num:'1',amt:''}]);
  const [ra,sRa]=useState('');
  const [er,sEr]=useState({});
  const [dm,sDm]=useState(false);

  useEffect(()=>{
    if(!isE)return;
    const m=DB.g('members').find(x=>x.id===memberId);
    if(!m)return;
    sF({name:m.name,nickname:m.nickname||'',phone:m.phone||'',location:m.location||'',notes:m.notes||'',status:m.status});
    const cs=DB.g('chittis').filter(x=>x.memberId===memberId);
    sCh(cs.length?cs.map(x=>({num:String(x.chittiNumber),amt:String(x.amount)})):[{num:'1',amt:''}]);
    const r=DB.g('rdEntries').find(x=>x.memberId===memberId);
    sRa(r?String(r.amount):'');
  },[memberId]);

  const val=()=>{
    const e={};
    if(!f.name.trim())e.name='Required';
    if(f.phone&&!/^\d{10}$/.test(f.phone.replace(/\s/g,'')))e.phone='Must be 10 digits';
    ch.forEach((c,i)=>{if(c.amt&&(isNaN(c.amt)||Number(c.amt)<=0))e[`c${i}`]='Invalid'});
    if(ra&&(isNaN(ra)||Number(ra)<=0))e.rd='Invalid';
    sEr(e);return!Object.keys(e).length;
  };

  const save=()=>{
    if(!val())return;
    const now=new Date().toISOString();
    if(isE){
      DB.s('members',DB.g('members').map(m=>m.id===memberId?{...m,...f,updatedAt:now}:m));
      let aC=DB.g('chittis').filter(c=>c.memberId!==memberId);
      ch.filter(c=>c.amt).forEach((c,i)=>aC.push({id:Date.now()+i,memberId,chittiNumber:c.num||String(i+1),amount:Number(c.amt),createdAt:now}));
      DB.s('chittis',aC);
      let aR=DB.g('rdEntries').filter(r=>r.memberId!==memberId);
      if(ra&&Number(ra)>0)aR.push({id:Date.now(),memberId,amount:Number(ra),createdAt:now});
      DB.s('rdEntries',aR);
      notify({t:'success',m:'Member updated!'});nav('detail',memberId);
    }else{
      const nid=DB.nid('members');
      DB.s('members',[...DB.g('members'),{id:nid,...f,name:cap(f.name.trim()),createdAt:now}]);
      let aC=DB.g('chittis');
      ch.filter(c=>c.amt).forEach((c,i)=>aC.push({id:Date.now()+i,memberId:nid,chittiNumber:c.num||String(i+1),amount:Number(c.amt),createdAt:now}));
      DB.s('chittis',aC);
      let aR=DB.g('rdEntries');
      if(ra&&Number(ra)>0)aR.push({id:Date.now(),memberId:nid,amount:Number(ra),createdAt:now});
      DB.s('rdEntries',aR);
      notify({t:'success',m:'Member added!'});nav('dash');
    }
  };

  const del=()=>{
    DB.s('members',DB.g('members').filter(m=>m.id!==memberId));
    DB.s('chittis',DB.g('chittis').filter(c=>c.memberId!==memberId));
    DB.s('rdEntries',DB.g('rdEntries').filter(r=>r.memberId!==memberId));
    DB.s('payments',DB.g('payments').filter(p=>p.memberId!==memberId));
    notify({t:'success',m:'Deleted.'});nav('dash');
  };

  return(<div className="pg" style={{maxWidth:700}}>
    {dm&&<Cfm danger title="🗑 Delete Member" text={`Delete "${cap(f.name)}" and all data? Cannot undo.`} onOk={del} onNo={()=>sDm(false)}/>}
    <button className="bk" onClick={()=>nav(isE?'detail':'dash',memberId)}>← Back</button>
    <div style={{margin:'16px 0 24px'}}><h1 style={{fontSize:24,fontWeight:800}} className="tgg">{isE?'Edit Member':'New Member'}</h1></div>
    <div className="fsec"><div className="fsec-t">👤 Personal Info</div>
      <div className="g2">
        <div className="fg"><label className="fl">Name *</label><input className={`fi ${er.name?'er':''}`} placeholder="Name" value={f.name} onChange={e=>sF(p=>({...p,name:e.target.value}))}/>{er.name&&<div className="fi-e">{er.name}</div>}</div>
        <div className="fg"><label className="fl">Nickname</label><input className="fi" placeholder="Optional" value={f.nickname} onChange={e=>sF(p=>({...p,nickname:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Phone</label><input className={`fi ${er.phone?'er':''}`} placeholder="10 digits" value={f.phone} onChange={e=>sF(p=>({...p,phone:e.target.value}))}/>{er.phone&&<div className="fi-e">{er.phone}</div>}</div>
        <div className="fg"><label className="fl">Location</label><input className="fi" placeholder="Location/Reference" value={f.location} onChange={e=>sF(p=>({...p,location:e.target.value}))}/></div>
      </div>
      {isE&&<div className="fg"><label className="fl">Status</label><select className="fi" value={f.status} onChange={e=>sF(p=>({...p,status:e.target.value}))}><option value="active">Active</option><option value="quit">Quit</option></select></div>}
      <div className="fg" style={{marginBottom:0,marginTop:12}}><label className="fl">Notes</label><textarea className="fi fi-ta" placeholder="Notes…" value={f.notes} onChange={e=>sF(p=>({...p,notes:e.target.value}))}/></div>
    </div>
    <div className="fsec"><div className="fsec-t">🎟 Chitti Details</div>
      {ch.map((c,i)=>(<div className="crow" key={i}>
        <div>{i===0&&<label className="fl">Chitti #</label>}<input className="fi" placeholder="#" value={c.num} onChange={e=>sCh(p=>p.map((x,j)=>j===i?{...x,num:e.target.value}:x))}/></div>
        <div>
          {i===0&&<label className="fl" style={{display:'flex',alignItems:'center',gap:6}}>
            Amount (₹)
            {c.num&&getChittiPeriod(c.num)&&<span className="period-badge">{getChittiPeriod(c.num)}</span>}
          </label>}
          {i>0&&c.num&&getChittiPeriod(c.num)&&<div style={{marginBottom:4}}><span className="period-badge">{getChittiPeriod(c.num)}</span></div>}
          <input className={`fi ${er[`c${i}`]?'er':''}`} type="number" placeholder="0" value={c.amt} onChange={e=>sCh(p=>p.map((x,j)=>j===i?{...x,amt:e.target.value}:x))}/>
        </div>
        <div style={{paddingBottom:1}}>{ch.length>1&&<button className="btn btn-r btn-xs" onClick={()=>sCh(p=>p.filter((_,j)=>j!==i))}>✕</button>}</div>
      </div>))}
      <button className="btn btn-o btn-sm" onClick={()=>sCh(p=>[...p,{num:String(p.length+1),amt:''}])}>＋ Add Chitti</button>
    </div>
    <div className="fsec"><div className="fsec-t">💳 RD (Monthly)</div>
      <div className="fg" style={{marginBottom:0}}><label className="fl">RD Amount (₹)</label>
        <input className={`fi ${er.rd?'er':''}`} type="number" placeholder="0" value={ra} onChange={e=>sRa(e.target.value)} style={{maxWidth:280}}/>{er.rd&&<div className="fi-e">{er.rd}</div>}
      </div>
    </div>
    <div style={{display:'flex',flexDirection:'column',gap:10}}>
      <button className="btn btn-e btn-f" onClick={save}>{isE?'✅ Update':'✅ Add Member'}</button>
      <button className="btn btn-gh btn-f" onClick={()=>nav(isE?'detail':'dash',memberId)}>Cancel</button>
      {isE&&<button className="btn btn-r btn-f" onClick={()=>sDm(true)}>🗑 Delete Member</button>}
    </div>
  </div>);
}

  const [payments,setP]=useState([]);
  const [sort,setSort]=useState('name');
  const [editRow,setER]=useState(null);
  const [sq,setSq]=useState('');

  useEffect(()=>{
    const sync=()=>{setM(DB.g('members').filter(m=>m.status==='active'));setC(DB.g('chittis'));setR(DB.g('rdEntries'));setP(DB.g('payments'))};
    sync();window.addEventListener('focus',sync);return()=>window.removeEventListener('focus',sync);
  },[]);

  const months=useMemo(()=>{const r=[];const n=new Date();for(let i=0;i<24;i++){const d=new Date(n.getFullYear(),n.getMonth()-i,1);r.push(d.toISOString().slice(0,7))}return r},[]);
  const ct=mId=>chittis.filter(c=>c.memberId===mId).reduce((s,c)=>s+Number(c.amount),0);
  const rt=mId=>rd.filter(r=>r.memberId===mId).reduce((s,r)=>s+Number(r.amount),0);

  const rows=useMemo(()=>{
    const lq=sq.toLowerCase().trim();
    let r=members
      .filter(m=>!lq||(m.name.toLowerCase().includes(lq)||(m.location||'').toLowerCase().includes(lq)||(m.nickname||'').toLowerCase().includes(lq)))
      .map(m=>{const p=payments.find(pp=>pp.memberId===m.id&&pp.month===sel);const cd=ct(m.id),rd2=rt(m.id),tot=cd+rd2,st=p?p.status:'unpaid';return{member:m,cd,rd2,tot,pay:p,st}});
    if(sort==='name')r.sort((a,b)=>a.member.name.localeCompare(b.member.name));
    else if(sort==='status'){const o={paid:0,partial:1,unpaid:2};r.sort((a,b)=>o[a.st]-o[b.st])}
    else if(sort==='amt')r.sort((a,b)=>b.tot-a.tot);
    return r;
  },[members,chittis,rd,payments,sel,sort,sq]);

  const stats=useMemo(()=>({total:rows.length,paid:rows.filter(r=>r.st==='paid').length,partial:rows.filter(r=>r.st==='partial').length,unpaid:rows.filter(r=>r.st==='unpaid').length,
    coll:rows.reduce((s,r)=>s+(r.pay?Number(r.pay.chittiAmount||0)+Number(r.pay.rdAmount||0):0),0),due:rows.reduce((s,r)=>s+r.tot,0)}),[rows]);

  const savePay=(mId,status,ca,ra2)=>{
    let all=DB.g('payments');
    const ex=all.find(p=>p.memberId===mId&&p.month===sel);
    if(ex)all=all.map(p=>p.id===ex.id?{...p,status,chittiAmount:Number(ca||0),rdAmount:Number(ra2||0),updatedAt:new Date().toISOString()}:p);
    else all.push({id:Date.now(),memberId:mId,month:sel,chittiAmount:Number(ca||0),rdAmount:Number(ra2||0),status,createdAt:new Date().toISOString()});
    DB.s('payments',all);setP(DB.g('payments'));setER(null);notify({t:'success',m:'Payment updated!'});
  };

  return(<div className="pg">
    <button className="bk" onClick={()=>nav('dash')}>← Dashboard</button>
    <div style={{margin:'16px 0 22px'}}><h1 style={{fontSize:24,fontWeight:800}} className="tgg">Monthly Summary</h1></div>
    <div style={{display:'flex',gap:10,marginBottom:18,flexWrap:'wrap',alignItems:'center'}}>
      <select className="msel" value={sel} onChange={e=>setSel(e.target.value)}>{months.map(m=><option key={m} value={m}>{mLbl(m)}</option>)}</select>
      <select className="msel" value={sort} onChange={e=>setSort(e.target.value)}><option value="name">A–Z</option><option value="status">Status</option><option value="amt">Amount</option></select>
      <div style={{flex:1,minWidth:160,position:'relative'}}>
        <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'var(--ts)',fontSize:14}}>🔍</span>
        <input className="msel" style={{paddingLeft:34,width:'100%'}} placeholder="Search…" value={sq} onChange={e=>setSq(e.target.value)}/>
      </div>
    </div>
    <div className="g4" style={{marginBottom:16}}>
      <div className="crd" style={{textAlign:'center',padding:14}}><div style={{fontSize:24,fontWeight:900,color:'var(--sa)'}}>{stats.total}</div><div style={{fontSize:10,color:'var(--ts)',marginTop:3}}>Total</div></div>
      <div className="crd" style={{textAlign:'center',padding:14}}><div style={{fontSize:24,fontWeight:900,color:'var(--em)'}}>{stats.paid}</div><div style={{fontSize:10,color:'var(--ts)',marginTop:3}}>✅ Paid</div></div>
      <div className="crd" style={{textAlign:'center',padding:14}}><div style={{fontSize:24,fontWeight:900,color:'var(--g)'}}>{stats.partial}</div><div style={{fontSize:10,color:'var(--ts)',marginTop:3}}>⚠️ Partial</div></div>
      <div className="crd" style={{textAlign:'center',padding:14}}><div style={{fontSize:24,fontWeight:900,color:'var(--rb)'}}>{stats.unpaid}</div><div style={{fontSize:10,color:'var(--ts)',marginTop:3}}>❌ Unpaid</div></div>
    </div>
    <div style={{display:'flex',gap:12,marginBottom:18,flexWrap:'wrap'}}>
      <div className="crd" style={{flex:1,padding:'10px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{color:'var(--ts)',fontSize:12}}>Due</span><span style={{fontSize:18,fontWeight:900,color:'var(--ro)'}}>{fmt(stats.due)}</span></div>
      <div className="crd" style={{flex:1,padding:'10px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{color:'var(--ts)',fontSize:12}}>Collected</span><span style={{fontSize:18,fontWeight:900,color:'var(--em)'}}>{fmt(stats.coll)}</span></div>
      <div className="crd" style={{flex:1,padding:'10px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{color:'var(--ts)',fontSize:12}}>Remaining</span><span style={{fontSize:18,fontWeight:900,color:'var(--rb)'}}>{fmt(stats.due-stats.coll)}</span></div>
    </div>
    <div className="crd" style={{padding:0,overflow:'hidden'}}>
      <div className="tbw"><table className="tbl"><thead><tr>
        <th>#</th><th>Member</th><th>Location</th><th>Chitti</th><th>RD</th><th>Total</th><th>Paid</th><th>Status</th><th>Action</th>
      </tr></thead><tbody>
        {rows.length===0?<tr><td colSpan={9} style={{textAlign:'center',padding:36,color:'var(--ts)'}}>No members</td></tr>
        :rows.map((r,i)=>{const pa=r.pay?Number(r.pay.chittiAmount||0)+Number(r.pay.rdAmount||0):0;return(
          <tr key={r.member.id}>
            <td style={{color:'var(--ts)',fontSize:11}}>{i+1}</td>
            <td><div style={{fontWeight:700,color:'var(--g)',fontSize:13,cursor:'pointer'}} onClick={()=>nav('detail',r.member.id)}>{cap(r.member.name)}</div>{r.member.nickname&&<div style={{fontSize:10,color:'var(--tl)'}}>{r.member.nickname}</div>}</td>
            <td style={{color:'var(--ts)',fontSize:11}}>{r.member.location||'—'}</td>
            <td style={{color:'var(--sa)',fontWeight:600,fontSize:12}}>{fmt(r.cd)}</td>
            <td style={{color:'var(--vi)',fontWeight:600,fontSize:12}}>{fmt(r.rd2)}</td>
            <td style={{color:'var(--g)',fontWeight:800,fontSize:13}}>{fmt(r.tot)}</td>
            <td style={{color:pa>0?'var(--em)':'var(--ts)',fontWeight:600,fontSize:12}}>{pa>0?fmt(pa):'—'}</td>
            <td><span className={`bdg bdg-${r.st==='paid'?'p':r.st==='partial'?'pt':'u'}`}>{r.st==='paid'?'✅':r.st==='partial'?'⚠️':'❌'} {r.st.charAt(0).toUpperCase()+r.st.slice(1)}</span></td>
            <td><button className="btn btn-o btn-xs" onClick={()=>setER(r)}>Update</button></td>
          </tr>
        )})}
      </tbody></table></div>
    </div>
    {editRow&&<PMdl row={editRow} month={sel} onSave={(s,a,b)=>savePay(editRow.member.id,s,a,b)} onClose={()=>setER(null)}/>}
  </div>);
}

/* ── Payment Modal ── */
function PMdl({row,month,onSave,onClose}){
  const [st,sSt]=useState(row.pay?.status||'unpaid');
  const [ca,sCa]=useState(String(row.pay?.chittiAmount||''));
  const [ra,sRa]=useState(String(row.pay?.rdAmount||''));
  const pt=Number(ca||0)+Number(ra||0);
  return(<div className="ov" onClick={onClose}><div className="mdl" onClick={e=>e.stopPropagation()}>
    <div className="mdl-t">💸 Update Payment</div>
    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
      <div style={{width:40,height:40,borderRadius:10,background:'rgba(240,180,41,.15)',border:'1px solid var(--bdb)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,color:'var(--g)',fontSize:14}}>{ini(row.member.name)}</div>
      <div><div style={{fontWeight:700,color:'var(--g)',fontSize:16}}>{cap(row.member.name)}</div><div style={{fontSize:11,color:'var(--ts)'}}>{mLbl(month)} · Due: {fmt(row.tot)}</div></div>
    </div>
    <div className="fg"><label className="fl">Chitti Paid (₹) <span style={{color:'var(--ts)',fontWeight:400,textTransform:'none',letterSpacing:0}}>— due {fmt(row.cd)}</span></label><input className="fi" type="number" value={ca} onChange={e=>sCa(e.target.value)} placeholder="0"/></div>
    <div className="fg"><label className="fl">RD Paid (₹) <span style={{color:'var(--ts)',fontWeight:400,textTransform:'none',letterSpacing:0}}>— due {fmt(row.rd2)}</span></label><input className="fi" type="number" value={ra} onChange={e=>sRa(e.target.value)} placeholder="0"/></div>
    <div className="fg" style={{marginBottom:6}}><label className="fl">Status</label><select className="fi" value={st} onChange={e=>sSt(e.target.value)}><option value="paid">✅ Paid</option><option value="partial">⚠️ Partial</option><option value="unpaid">❌ Unpaid</option></select></div>
    {pt>0&&<div style={{marginBottom:14,padding:'8px 12px',background:'rgba(6,214,160,.08)',borderRadius:8,fontSize:13}}>
      <span style={{color:'var(--ts)'}}>Recording: </span><span className="te" style={{fontWeight:700}}>{fmt(pt)}</span>
      {pt<row.tot&&<span className="tr2" style={{fontSize:11,marginLeft:8}}>(Balance: {fmt(row.tot-pt)})</span>}
    </div>}
    <div className="mdl-a"><button className="btn btn-gh btn-f" onClick={onClose}>Cancel</button><button className="btn btn-g btn-f" onClick={()=>onSave(st,ca,ra)}>Save</button></div>
  </div></div>);
}

/* ── App ── */
function App(){
  const [pg,sPg]=useState('dash');
  const [dt,sDt]=useState(null);
  const [ntf,sNtf]=useState(null);
  const [showReminder,setSR]=useState(false);
  const [showEditMsg,setSEM]=useState(false);
  const [rk,sRk]=useState(0);

  const nav=(p,d)=>{sPg(p);sDt(d??null);sRk(k=>k+1);window.scrollTo({top:0,behavior:'smooth'})};
  const notify=n=>sNtf(n);

  return(<>
    <Hdr
      nav={nav}
      onReminder={()=>setSR(true)}
      onEditMsg={()=>setSEM(true)}
      currentPage={pg}
    />
    {pg==='dash'&&<Dash key={rk} nav={nav} notify={notify}/>}
    {pg==='add'&&<MForm key={rk} memberId={null} nav={nav} notify={notify}/>}
    {pg==='edit'&&<MForm key={rk} memberId={dt} nav={nav} notify={notify}/>}
    {pg==='detail'&&<MDetail key={rk} memberId={dt} nav={nav} notify={notify}/>}
    {pg==='monthly'&&<Monthly key={rk} nav={nav} notify={notify}/>}
    {showReminder&&<ReminderModal onClose={()=>setSR(false)} notify={notify}/>}
    {showEditMsg&&<EditReminderModal onClose={()=>setSEM(false)} notify={notify}/>}
    <Ntf n={ntf} onClose={()=>sNtf(null)}/>
  </>);
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>

<html lang="en">
<head>

<style>
:root{
  --bg:#080810;--bg2:#0e0e1c;--bgc:#111120;--bgch:#16162a;--bgi:#0a0a18;
  --g:#f0b429;--gl:#ffd166;--gd:#c88a00;--am:#ff9f1c;

  --sa:#4895ef;--vi:#b185db;--ro:#ff6b9d;--tl:#2ec4b6;
  --tp:#f0e6ce;--ts:#8a7560;--tm:#3a3020;
  --bd:rgba(240,180,41,.18);--bdb:rgba(240,180,41,.55);
  --sg:0 0 24px rgba(240,180,41,.12);--sgl:0 0 48px rgba(240,180,41,.22);
  --r:14px;--rs:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',sans-serif;background:var(--bg);color:var(--tp);min-height:100vh;
  background-image:
    radial-gradient(ellipse 60% 40% at 10% 10%,rgba(240,180,41,.05) 0%,transparent 60%),
    radial-gradient(ellipse 50% 40% at 90% 90%,rgba(255,159,28,.04) 0%,transparent 60%);
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--gd);border-radius:3px}

@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideR{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}

/* Header */
.hdr{position:sticky;top:0;z-index:200;background:rgba(8,8,16,.94);backdrop-filter:blur(24px);border-bottom:1px solid var(--bd);padding:0 24px;height:64px;display:flex;align-items:center}
.hdr-in{max-width:1440px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{display:flex;align-items:center;gap:12px;cursor:pointer}
.logo-b{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--g),var(--am));display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:900;color:#080810;box-shadow:0 0 18px rgba(240,180,41,.45);flex-shrink:0}
.logo-n{font-size:16px;font-weight:800;letter-spacing:.8px;background:linear-gradient(90deg,var(--gl),var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1}
.logo-t{font-size:10px;color:var(--ts);letter-spacing:.4px;margin-top:1px}
.hdr-a{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hdr-left{display:flex;align-items:center;gap:12px}

/* Hamburger */

  width:40px;height:40px;border-radius:10px;border:1px solid var(--bd);
  background:transparent;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:5px;transition:all .2s;flex-shrink:0;
}
.ham-btn:hover{background:var(--bgc);border-color:var(--bdb)}
.ham-line{width:18px;height:2px;background:var(--g);border-radius:2px;transition:all .2s}

/* Sidebar */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;backdrop-filter:blur(3px);animation:fadeIn .2s ease}
.sidebar{
  position:fixed;left:0;top:0;bottom:0;width:280px;z-index:400;
  background:var(--bg2);border-right:1px solid var(--bdb);
  display:flex;flex-direction:column;animation:slideInLeft .25s ease;
  overflow-y:auto;
}

  padding:20px 20px 16px;border-bottom:1px solid var(--bd);
  display:flex;align-items:center;justify-content:space-between;
}
.sidebar-logo{display:flex;align-items:center;gap:10px}
.sidebar-logo-b{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--g),var(--am));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#080810}
.sidebar-logo-n{font-size:14px;font-weight:800;background:linear-gradient(90deg,var(--gl),var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.sidebar-close:hover{background:var(--bgc);color:var(--tp)}
.sidebar-nav{padding:12px 12px;flex:1;display:flex;flex-direction:column;gap:4px}
.sidebar-item{
  display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;
  cursor:pointer;transition:all .2s;border:1px solid transparent;
  font-size:14px;font-weight:600;color:var(--ts);background:transparent;
  font-family:'Inter',sans-serif;text-align:left;width:100%;
}
.sidebar-item:hover{background:var(--bgch);color:var(--tp);border-color:var(--bd)}
.sidebar-item.active{background:rgba(240,180,41,.1);color:var(--g);border-color:rgba(240,180,41,.25)}
.sidebar-item-icon{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.sidebar-divider{height:1px;background:var(--bd);margin:8px 0}
.sidebar-section-label{font-size:10px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:1.5px;padding:6px 14px 4px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:10px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;transition:all .2s;letter-spacing:.2px;white-space:nowrap}
.btn:hover{transform:translateY(-1px)}.btn:active{transform:translateY(0)}
.btn-g{background:linear-gradient(135deg,var(--g),var(--am));color:#080810;box-shadow:0 4px 14px rgba(240,180,41,.32)}
.btn-g:hover{box-shadow:0 6px 24px rgba(240,180,41,.5)}
.btn-e{background:linear-gradient(135deg,var(--em),var(--emd));color:#080810;box-shadow:0 4px 14px rgba(6,214,160,.28)}
.btn-e:hover{box-shadow:0 6px 24px rgba(6,214,160,.5)}
.btn-r{background:linear-gradient(135deg,var(--rb),var(--rbd));color:#fff;box-shadow:0 4px 14px rgba(239,35,60,.28)}
.btn-r:hover{box-shadow:0 6px 24px rgba(239,35,60,.48)}
.btn-gh{background:transparent;color:var(--ts);border:1px solid var(--bd)}
.btn-gh:hover{background:var(--bgc);color:var(--tp);border-color:var(--bdb)}
.btn-o{background:transparent;color:var(--g);border:1px solid var(--bdb)}
.btn-o:hover{background:rgba(240,180,41,.08)}
.btn-w{background:linear-gradient(135deg,#25d366,#128c7e);color:#fff;box-shadow:0 4px 14px rgba(37,211,102,.28)}
.btn-w:hover{box-shadow:0 6px 24px rgba(37,211,102,.5)}
.btn-sa{background:linear-gradient(135deg,var(--sa),#3a7bd5);color:#fff;box-shadow:0 4px 14px rgba(72,149,239,.28)}
.btn-sa:hover{box-shadow:0 6px 24px rgba(72,149,239,.48)}
.btn-sm{padding:7px 13px;font-size:12px;border-radius:8px}
.btn-xs{padding:5px 10px;font-size:11px;border-radius:6px}
.btn-f{width:100%;justify-content:center;padding:13px;font-size:14px}
.btn-dis{opacity:.45;pointer-events:none}

/* Cards */
.crd{background:var(--bgc);border:1px solid var(--bd);border-radius:var(--r);padding:22px;transition:border-color .2s,box-shadow .2s}
.crd:hover{border-color:rgba(240,180,41,.32);box-shadow:var(--sg)}
.crd-g{border-color:rgba(240,180,41,.35)}.crd-e{border-color:rgba(6,214,160,.3)}
.crd-r{border-color:rgba(239,35,60,.3)}.crd-s{border-color:rgba(72,149,239,.3)}
.crd-v{border-color:rgba(177,133,219,.3)}.crd-ro{border-color:rgba(255,107,157,.3)}

/* Stat Card */
.sc{background:var(--bgc);border-radius:var(--r);padding:22px 20px;position:relative;overflow:hidden;transition:transform .25s,box-shadow .25s;cursor:default}
.sc::after{content:'';position:absolute;inset:0;border-radius:var(--r);border:1px solid transparent;background:var(--grad) border-box;-webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude}

/* Member Card */
.mc{background:var(--bgc);border:1px solid var(--bd);border-radius:var(--r);padding:16px 18px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--g),var(--am));border-radius:0 2px 2px 0}
.mc:hover{border-color:var(--bdb);box-shadow:var(--sg);transform:translateX(3px) translateY(-1px);background:var(--bgch)}
.mc-av{width:48px;height:48px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,rgba(240,180,41,.15),rgba(255,159,28,.08));border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:var(--g)}
.mc-nm{font-size:17px;font-weight:800;line-height:1.2;background:linear-gradient(90deg,var(--gl),var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* ── Build reminder message (Parts 4 & 6) ── */
function buildReminderMsg(member, chittis, rd){
  const mc=chittis.filter(c=>c.memberId===member.id);
  const mr=rd.filter(r=>r.memberId===member.id);
  const cTotal=mc.reduce((s,c)=>s+Number(c.amount),0);
  const rTotal=mr.reduce((s,r)=>s+Number(r.amount),0);
  const total=cTotal+rTotal;

  // Chitti lines WITH period (Part 6)
  const chittiLines=mc.map(c=>`  🎟 ${fmtChittiLabel(c.chittiNumber)}: ${fmt(c.amount)}`).join('\n');
  const rdLine=mr.length?`\n  💳 RD (Monthly): ${fmt(rTotal)}`:'';
  const allLines=chittiLines+(rdLine||'');

  // Check for saved custom template (Part 4)
  const savedTemplate=DB.getReminderTemplate();
  if(savedTemplate&&savedTemplate.trim()){
    // Replace placeholders in custom template
    return savedTemplate
      .replace(/{name}/g,cap(member.name))
      .replace(/{chittiLines}/g,allLines)
      .replace(/{total}/g,fmt(total));
  }

  // Default message (existing logic preserved, only chitti label updated)
  return `Dear ${cap(member.name)},\n\nAssalamu Alaikum! I hope this message finds you well.\n\nHere are your payment details for the Chitti:\n\n${chittiLines}${rdLine}\n\n📊 Total Amount Due: ${fmt(total)}\n\nKindly arrange the payment at your earliest convenience.\n\nJazakAllahu Khairan!\n\nBest regards,\nZ — Chitti Management`;
}

/* ── Notification ── */
function Ntf({n,onClose}){
  useEffect(()=>{if(n){const t=setTimeout(onClose,3500);return()=>clearTimeout(t)}},[n]);
  if(!n)return null;
  return<div className={`ntf ntf-${n.t==='success'?'s':n.t==='error'?'e':'i'}`}><span>{n.t==='success'?'✅':n.t==='error'?'❌':'ℹ️'}</span>{n.m}</div>;
}

/* ── Confirm ── */
function Cfm({title,text,onOk,onNo,danger}){
  return(<div className="ov" onClick={onNo}><div className="mdl" onClick={e=>e.stopPropagation()}>
    <div className="mdl-t">{title}</div><div className="mdl-tx">{text}</div>
    <div className="mdl-a"><button className="btn btn-gh btn-f" onClick={onNo}>Cancel</button><button className={`btn ${danger?'btn-r':'btn-g'} btn-f`} onClick={onOk}>Confirm</button></div>
  </div></div>);
}

/* ── Edit Reminder Message Modal (Part 3) ── */
function EditReminderModal({onClose,notify}){
  const saved=DB.getReminderTemplate();
  const [msg,setMsg]=useState(saved||DEFAULT_REMINDER_TEMPLATE);

  const save=()=>{
    DB.setReminderTemplate(msg);
    notify({t:'success',m:'Reminder message saved!'});
    onClose();
  };

  const reset=()=>{
    setMsg(DEFAULT_REMINDER_TEMPLATE);
  };

  return(<div className="ov" onClick={onClose}><div className="mdl mdl-lg" onClick={e=>e.stopPropagation()}>
    <div className="mdl-t">✏️ Edit Reminder Message</div>
    <div style={{fontSize:13,color:'var(--ts)',marginBottom:8,lineHeight:1.6}}>
      Customize the WhatsApp reminder message. Use placeholders:
    </div>
    <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
      {['{name}','{chittiLines}','{total}'].map(p=>(
        <span key={p} style={{padding:'3px 8px',background:'rgba(240,180,41,.12)',border:'1px solid rgba(240,180,41,.25)',borderRadius:6,fontSize:12,color:'var(--g)',fontFamily:'monospace'}}>{p}</span>
      ))}
    </div>
    <div style={{fontSize:11,color:'var(--ts)',marginBottom:14,padding:'8px 12px',background:'rgba(72,149,239,.08)',border:'1px solid rgba(72,149,239,.15)',borderRadius:8}}>
      ℹ️ Chitti numbers will automatically include period info e.g. <span style={{color:'var(--sa)'}}>Chitti #14 (NOV25-JUN27)</span>
    </div>
    <div className="fg">
      <label className="fl">Message Template</label>
      <textarea
        className="fi fi-ta-lg"
        value={msg}
        onChange={e=>setMsg(e.target.value)}
        style={{fontFamily:'monospace',fontSize:13,lineHeight:1.6}}
      />
    </div>
    <div style={{display:'flex',gap:10,marginBottom:14}}>
      <button className="btn btn-gh btn-sm" onClick={reset}>↺ Reset to Default</button>
    </div>
    <div className="mdl-a">
      <button className="btn btn-gh btn-f" onClick={onClose}>Cancel</button>
      <button className="btn btn-g btn-f" onClick={save}>💾 Save Message</button>
    </div>
  </div></div>);
}

/* ── Reminder Modal (updated to use buildReminderMsg) ── */
function ReminderModal({onClose,notify}){
  const members=DB.g('members').filter(m=>m.status==='active');
  const chittis=DB.g('chittis');
  const rd=DB.g('rdEntries');
  const payments=DB.g('payments');
  const cMonth=curM();

  const withPhone=members.filter(m=>m.phone&&m.phone.replace(/\D/g,'').length>=10);
  const [selected,setSel]=useState(new Set(withPhone.map(m=>m.id)));
  const [sending,setSending]=useState(false);
  const [sent,setSent]=useState(new Set());
  const [search,setSearch]=useState('');

  const ct=mId=>chittis.filter(c=>c.memberId===mId).reduce((s,c)=>s+Number(c.amount),0);
  const rt=mId=>rd.filter(r=>r.memberId===mId).reduce((s,r)=>s+Number(r.amount),0);
  const isPaid=mId=>{const p=payments.find(pp=>pp.memberId===mId&&pp.month===cMonth);return p&&p.status==='paid'};

  const unpaidWithPhone=withPhone.filter(m=>!isPaid(m.id));

  const toggle=id=>{
    setSel(prev=>{const n=new Set(prev);if(n.has(id))n.delete(id);else n.add(id);return n});
  };
  const selectAll=()=>setSel(new Set(withPhone.map(m=>m.id)));
  const selectNone=()=>setSel(new Set());
  const selectUnpaid=()=>setSel(new Set(unpaidWithPhone.map(m=>m.id)));

  const filteredMembers=useMemo(()=>{
    const lq=search.toLowerCase().trim();
    if(!lq)return withPhone;
    return withPhone.filter(m=>m.name.toLowerCase().includes(lq)||(m.nickname||'').toLowerCase().includes(lq)||(m.location||'').toLowerCase().includes(lq));
  },[withPhone,search]);

  const sendReminders=async()=>{
    const toSend=[...selected].map(id=>withPhone.find(m=>m.id===id)).filter(Boolean);
    if(!toSend.length)return;
    setSending(true);
    for(let i=0;i<toSend.length;i++){
      const m=toSend[i];
      const ph=m.phone.replace(/\D/g,'');
      // Use unified message builder (Parts 4 & 6)
      const msg=buildReminderMsg(m,chittis,rd);
      window.open(`https://wa.me/91${ph}?text=${encodeURIComponent(msg)}`,'_blank');
      setSent(prev=>new Set([...prev,m.id]));
      if(i<toSend.length-1)await new Promise(r=>setTimeout(r,1500));
    }
    setSending(false);
    notify({t:'success',m:`Opened WhatsApp for ${toSend.length} member${toSend.length>1?'s':''}!`});
  };

  const noPhoneMembers=members.filter(m=>!m.phone||m.phone.replace(/\D/g,'').length<10);

  return(<div className="ov" onClick={onClose}><div className="mdl mdl-lg" onClick={e=>e.stopPropagation()}>
    <div className="mdl-t">📢 Send Payment Reminders</div>
    <p style={{fontSize:13,color:'var(--ts)',marginBottom:16,lineHeight:1.6}}>
      Select members to send WhatsApp reminders. Chitti periods are included automatically.
    </p>
    <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
      <button className="btn btn-g btn-xs" onClick={selectAll}>All ({withPhone.length})</button>
      <button className="btn btn-sa btn-xs" onClick={selectUnpaid}>Unpaid ({unpaidWithPhone.length})</button>
      <button className="btn btn-gh btn-xs" onClick={selectNone}>Deselect All</button>
    </div>
    <div className="swrp" style={{marginBottom:14}}>
      <span className="sico">🔍</span>
      <input className="sinp" style={{padding:'10px 14px 10px 42px',fontSize:13}} placeholder="Search members…" value={search} onChange={e=>setSearch(e.target.value)}/>
    </div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,fontSize:13}}>
      <span style={{color:'var(--ts)'}}>📱 {withPhone.length} with phone | <span style={{color:'var(--g)',fontWeight:700}}>{selected.size} selected</span></span>
      {noPhoneMembers.length>0&&<span style={{color:'var(--rb)',fontSize:11}}>{noPhoneMembers.length} without phone</span>}
    </div>
    <div style={{maxHeight:'40vh',overflowY:'auto',display:'flex',flexDirection:'column',gap:6,marginBottom:18,paddingRight:4}}>
      {filteredMembers.length===0?<div className="emp" style={{padding:30}}><div className="emp-t">No members with phone numbers</div></div>
      :filteredMembers.map(m=>{
        const isOn=selected.has(m.id);
        const isSent=sent.has(m.id);
        const paid=isPaid(m.id);
        const total=ct(m.id)+rt(m.id);
        return(
          <div key={m.id} className={`rem-item ${isOn?'sel':''}`} onClick={()=>!sending&&toggle(m.id)}>
            <div className={`chk ${isOn?'on':''}`}></div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                <span style={{fontWeight:700,fontSize:14,color:isOn?'var(--g)':'var(--tp)'}}>{cap(m.name)}</span>
                {m.location&&<span style={{fontSize:11,color:'var(--ts)'}}>📍{m.location}</span>}
                {paid&&<span className="bdg bdg-p" style={{fontSize:9}}>Paid</span>}
                {isSent&&<span className="bdg bdg-a" style={{fontSize:9}}>✅ Sent</span>}
              </div>
              <div style={{fontSize:11,color:'var(--ts)',marginTop:2}}>
                📞 {m.phone} · Total: <span style={{color:'var(--g)',fontWeight:600}}>{fmt(total)}</span>
              </div>
            </div>
          </div>
        );
      })}
    </div>
    {sending&&(
      <div className="sending">
        <div className="sending-dot"></div>
        <span>Opening WhatsApp… ({sent.size}/{selected.size} done)</span>
      </div>
    )}
    <div className="mdl-a">
      <button className="btn btn-gh btn-f" onClick={onClose} disabled={sending}>Close</button>
      <button className={`btn btn-w btn-f ${selected.size===0||sending?'btn-dis':''}`} onClick={sendReminders}>
        💬 Send to {selected.size} Member{selected.size!==1?'s':''}
      </button>
    </div>
    {noPhoneMembers.length>0&&(
      <details style={{marginTop:14}}>
        <summary style={{fontSize:12,color:'var(--ts)',cursor:'pointer'}}>⚠️ {noPhoneMembers.length} without phone</summary>
        <div style={{marginTop:8,display:'flex',flexWrap:'wrap',gap:6}}>
          {noPhoneMembers.map(m=><span key={m.id} style={{fontSize:11,padding:'3px 8px',background:'rgba(239,35,60,.08)',border:'1px solid rgba(239,35,60,.2)',borderRadius:6,color:'var(--rb)'}}>{cap(m.name)}</span>)}
        </div>
      </details>
    )}
  </div></div>);
}

/* ── Dashboard ── */
function Dash({nav,notify}){
  const [members,setM]=useState([]);
  const [chittis,setC]=useState([]);
  const [rd,setR]=useState([]);
  const [payments,setP]=useState([]);
  const [q,setQ]=useState('');
  const [tab,setTab]=useState('active');

  useEffect(()=>{
    const sync=()=>{setM(DB.g('members'));setC(DB.g('chittis'));setR(DB.g('rdEntries'));setP(DB.g('payments'))};
    sync();window.addEventListener('focus',sync);window.addEventListener('storage',sync);
    return()=>{window.removeEventListener('focus',sync);window.removeEventListener('storage',sync)};
  },[]);

  const ct=mId=>chittis.filter(c=>c.memberId===mId).reduce((s,c)=>s+Number(c.amount),0);
  const rt=mId=>rd.filter(r=>r.memberId===mId).reduce((s,r)=>s+Number(r.amount),0);
  const active=members.filter(m=>m.status==='active');
  const c=curM();
  const grand=active.reduce((s,m)=>s+ct(m.id)+rt(m.id),0);
  const coll=payments.filter(p=>p.month===c).reduce((s,p)=>s+Number(p.chittiAmount||0)+Number(p.rdAmount||0),0);
  const paidN=active.filter(m=>{const p=payments.find(pp=>pp.memberId===m.id&&pp.month===c);return p&&p.status==='paid'}).length;

  const filtered=useMemo(()=>{
    const lq=q.toLowerCase().trim();
    return members.filter(m=>{
      if(tab==='active'?m.status!=='active':m.status!=='quit')return false;
      if(!lq)return true;
      return m.name.toLowerCase().includes(lq)||(m.nickname||'').toLowerCase().includes(lq)||(m.location||'').toLowerCase().includes(lq);
    });
  },[members,q,tab]);

  return(<div className="pg">
    <div className="g4" style={{marginBottom:26}}>
      <SC icon="👥" label="Active Members" value={active.length} sub={`${members.filter(m=>m.status==='quit').length} past`} c="#f0b429"/>
      <SC icon="💰" label="Total Portfolio" value={fmt(grand)} sub="All chittis + RD" c="#4895ef"/>
      <SC icon="✅" label="Collected" value={fmt(coll)} sub={mLbl(c)} c="#06d6a0"/>
      <SC icon="⚠️" label="Pending" value={active.length-paidN} sub={`${paidN} paid`} c="#ef233c"/>
    </div>
    <div className="crd">
      <div className="sh">
        <div className="sh-t">Members <span>Directory</span><span className="cp">{filtered.length}</span></div>
        <button className="btn btn-g btn-sm" onClick={()=>nav('add')}>＋ Add</button>
      </div>
      <div className="swrp" style={{marginBottom:14}}>
        <span className="sico">🔍</span>
        <input className="sinp" placeholder="Search by name, nickname, or location…" value={q} onChange={e=>setQ(e.target.value)}/>
      </div>
      <div className="tabs" style={{marginBottom:16}}>
        <button className={`tab ${tab==='active'?'on':''}`} onClick={()=>setTab('active')}>🟢 Active<span className="cp">{members.filter(m=>m.status==='active').length}</span></button>
        <button className={`tab ${tab==='quit'?'on':''}`} onClick={()=>setTab('quit')}>⚫ Past<span className="cp">{members.filter(m=>m.status==='quit').length}</span></button>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {filtered.length===0?<div className="emp"><div className="emp-i">🔎</div><div className="emp-t">{q?'No results':'No members'}</div></div>
        :filtered.map((m,i)=>{const tc=ct(m.id),tr2=rt(m.id);return(
          <div key={m.id} className="mc sra" style={{animationDelay:`${Math.min(i*12,180)}ms`}} onClick={()=>nav('detail',m.id)}>
            <div className="mc-av">{ini(m.name)}</div>
            <div style={{flex:1,minWidth:0}}>
              <div className="mc-nm">{cap(m.name)}</div>
              <div className="mc-sub">
                {m.location&&<span>📍{m.location}</span>}
                {m.nickname&&<span className="ttl">"{m.nickname}"</span>}
                <span className={`bdg bdg-${m.status==='active'?'a':'q'}`}><span className={`dot dot-${m.status==='active'?'a':'q'}`}></span>{m.status==='active'?'Active':'Quit'}</span>
              </div>
            </div>
            <div className="mc-rt">
              {tc>0&&<div className="ab"><div className="ab-l tg">Chitti</div><div className="ab-v tg">{fmt(tc)}</div></div>}
              {tr2>0&&<div className="ab"><div className="ab-l tv">RD</div><div className="ab-v tv">{fmt(tr2)}</div></div>}
              <div className="ab"><div className="ab-l tro">Total</div><div className="ab-v tro">{fmt(tc+tr2)}</div></div>
            </div>
          </div>
        )})}
      </div>
    </div>
  </div>);
}

/* ── Member Form ── */
function MForm({memberId,nav,notify}){
  const isE=!!memberId;
  const [f,sF]=useState({name:'',nickname:'',phone:'',location:'',notes:'',status:'active'});
  const [ch,sCh]=useState([{num:'1',amt:''}]);
  const [ra,sRa]=useState('');
  const [er,sEr]=useState({});
  const [dm,sDm]=useState(false);

  useEffect(()=>{
    if(!isE)return;
    const m=DB.g('members').find(x=>x.id===memberId);
    if(!m)return;
    sF({name:m.name,nickname:m.nickname||'',phone:m.phone||'',location:m.location||'',notes:m.notes||'',status:m.status});
    const cs=DB.g('chittis').filter(x=>x.memberId===memberId);
    sCh(cs.length?cs.map(x=>({num:String(x.chittiNumber),amt:String(x.amount)})):[{num:'1',amt:''}]);
    const r=DB.g('rdEntries').find(x=>x.memberId===memberId);
    sRa(r?String(r.amount):'');
  },[memberId]);

  const val=()=>{
    const e={};
    if(!f.name.trim())e.name='Required';
    if(f.phone&&!/^\d{10}$/.test(f.phone.replace(/\s/g,'')))e.phone='Must be 10 digits';
    ch.forEach((c,i)=>{if(c.amt&&(isNaN(c.amt)||Number(c.amt)<=0))e[`c${i}`]='Invalid'});
    if(ra&&(isNaN(ra)||Number(ra)<=0))e.rd='Invalid';
    sEr(e);return!Object.keys(e).length;
  };

  const save=()=>{
    if(!val())return;
    const now=new Date().toISOString();
    if(isE){
      DB.s('members',DB.g('members').map(m=>m.id===memberId?{...m,...f,updatedAt:now}:m));
      let aC=DB.g('chittis').filter(c=>c.memberId!==memberId);
      ch.filter(c=>c.amt).forEach((c,i)=>aC.push({id:Date.now()+i,memberId,chittiNumber:c.num||String(i+1),amount:Number(c.amt),createdAt:now}));
      DB.s('chittis',aC);
      let aR=DB.g('rdEntries').filter(r=>r.memberId!==memberId);
      if(ra&&Number(ra)>0)aR.push({id:Date.now(),memberId,amount:Number(ra),createdAt:now});
      DB.s('rdEntries',aR);
      notify({t:'success',m:'Member updated!'});nav('detail',memberId);
    }else{
      const nid=DB.nid('members');
      DB.s('members',[...DB.g('members'),{id:nid,...f,name:cap(f.name.trim()),createdAt:now}]);
      let aC=DB.g('chittis');
      ch.filter(c=>c.amt).forEach((c,i)=>aC.push({id:Date.now()+i,memberId:nid,chittiNumber:c.num||String(i+1),amount:Number(c.amt),createdAt:now}));
      DB.s('chittis',aC);
      let aR=DB.g('rdEntries');
      if(ra&&Number(ra)>0)aR.push({id:Date.now(),memberId:nid,amount:Number(ra),createdAt:now});
      DB.s('rdEntries',aR);
      notify({t:'success',m:'Member added!'});nav('dash');
    }
  };

  const del=()=>{
    DB.s('members',DB.g('members').filter(m=>m.id!==memberId));
    DB.s('chittis',DB.g('chittis').filter(c=>c.memberId!==memberId));
    DB.s('rdEntries',DB.g('rdEntries').filter(r=>r.memberId!==memberId));
    DB.s('payments',DB.g('payments').filter(p=>p.memberId!==memberId));
    notify({t:'success',m:'Deleted.'});nav('dash');
  };

  return(<div className="pg" style={{maxWidth:700}}>
    {dm&&<Cfm danger title="🗑 Delete Member" text={`Delete "${cap(f.name)}" and all data? Cannot undo.`} onOk={del} onNo={()=>sDm(false)}/>}
    <button className="bk" onClick={()=>nav(isE?'detail':'dash',memberId)}>← Back</button>
    <div style={{margin:'16px 0 24px'}}><h1 style={{fontSize:24,fontWeight:800}} className="tgg">{isE?'Edit Member':'New Member'}</h1></div>
    <div className="fsec"><div className="fsec-t">👤 Personal Info</div>
      <div className="g2">
        <div className="fg"><label className="fl">Name *</label><input className={`fi ${er.name?'er':''}`} placeholder="Name" value={f.name} onChange={e=>sF(p=>({...p,name:e.target.value}))}/>{er.name&&<div className="fi-e">{er.name}</div>}</div>
        <div className="fg"><label className="fl">Nickname</label><input className="fi" placeholder="Optional" value={f.nickname} onChange={e=>sF(p=>({...p,nickname:e.target.value}))}/></div>
        <div className="fg"><label className="fl">Phone</label><input className={`fi ${er.phone?'er':''}`} placeholder="10 digits" value={f.phone} onChange={e=>sF(p=>({...p,phone:e.target.value}))}/>{er.phone&&<div className="fi-e">{er.phone}</div>}</div>
        <div className="fg"><label className="fl">Location</label><input className="fi" placeholder="Location/Reference" value={f.location} onChange={e=>sF(p=>({...p,location:e.target.value}))}/></div>
      </div>
