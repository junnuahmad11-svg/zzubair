/* ── Monthly ── */
function Monthly({nav,notify}){
  const [sel,setSel]=useState(curM());
  const [members,setM]=useState([]);
  const [chittis,setC]=useState([]);
  const [rd,setR]=useState([]);
  const [payments,setP]=useState([]);
  const [sort,setSort]=useState('name');
  const [editRow,setER]=useState(null);
  const [sq,setSq]=useState('');

  useEffect(()=>{
    const sync=()=>{setM(DB.g('members').filter(m=>m.status==='active'));setC(DB.g('chittis'));setR(DB.g('rdEntries'));setP(DB.g('payments'))};
    sync();window.addEventListener('focus',sync);return()=>window.removeEventListener('focus',sync);
  },[]);

  const months=useMemo(()=>{const r=[];const n=new Date();for(let i=0;i<24;i++){const d=new Date(n.getFullYear(),n.getMonth()-i,1);r.push(d.toISOString().slice(0,7))}return r},[]);
  const ct=mId=>chittis.filter(c=>c.memberId===mId).reduce((s,c)=>s+Number(c.amount),0);
  const rt=mId=>rd.filter(r=>r.memberId===mId).reduce((s,r)=>s+Number(r.amount),0);

  const rows=useMemo(()=>{
    const lq=sq.toLowerCase().trim();
    let r=members
      .filter(m=>!lq||(m.name.toLowerCase().includes(lq)||(m.location||'').toLowerCase().includes(lq)||(m.nickname||'').toLowerCase().includes(lq)))
      .map(m=>{const p=payments.find(pp=>pp.memberId===m.id&&pp.month===sel);const cd=ct(m.id),rd2=rt(m.id),tot=cd+rd2,st=p?p.status:'unpaid';return{member:m,cd,rd2,tot,pay:p,st}});
    if(sort==='name')r.sort((a,b)=>a.member.name.localeCompare(b.member.name));
    else if(sort==='status'){const o={paid:0,partial:1,unpaid:2};r.sort((a,b)=>o[a.st]-o[b.st])}
    else if(sort==='amt')r.sort((a,b)=>b.tot-a.tot);
    return r;
  },[members,chittis,rd,payments,sel,sort,sq]);

  const stats=useMemo(()=>({total:rows.length,paid:rows.filter(r=>r.st==='paid').length,partial:rows.filter(r=>r.st==='partial').length,unpaid:rows.filter(r=>r.st==='unpaid').length,
    coll:rows.reduce((s,r)=>s+(r.pay?Number(r.pay.chittiAmount||0)+Number(r.pay.rdAmount||0):0),0),due:rows.reduce((s,r)=>s+r.tot,0)}),[rows]);

  const savePay=(mId,status,ca,ra2)=>{
    let all=DB.g('payments');
    const ex=all.find(p=>p.memberId===mId&&p.month===sel);
    if(ex)all=all.map(p=>p.id===ex.id?{...p,status,chittiAmount:Number(ca||0),rdAmount:Number(ra2||0),updatedAt:new Date().toISOString()}:p);
    else all.push({id:Date.now(),memberId:mId,month:sel,chittiAmount:Number(ca||0),rdAmount:Number(ra2||0),status,createdAt:new Date().toISOString()});
    DB.s('payments',all);setP(DB.g('payments'));setER(null);notify({t:'success',m:'Payment updated!'});
  };

  return(<div className="pg">
    <button className="bk" onClick={()=>nav('dash')}>← Dashboard</button>
    <div style={{margin:'16px 0 22px'}}><h1 style={{fontSize:24,fontWeight:800}} className="tgg">Monthly Summary</h1></div>
    <div style={{display:'flex',gap:10,marginBottom:18,flexWrap:'wrap',alignItems:'center'}}>
      <select className="msel" value={sel} onChange={e=>setSel(e.target.value)}>{months.map(m=><option key={m} value={m}>{mLbl(m)}</option>)}</select>
      <select className="msel" value={sort} onChange={e=>setSort(e.target.value)}><option value="name">A–Z</option><option value="status">Status</option><option value="amt">Amount</option></select>
      <div style={{flex:1,minWidth:160,position:'relative'}}>
        <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'var(--ts)',fontSize:14}}>🔍</span>
        <input className="msel" style={{paddingLeft:34,width:'100%'}} placeholder="Search…" value={sq} onChange={e=>setSq(e.target.value)}/>
      </div>
    </div>
    <div className="g4" style={{marginBottom:16}}>
      <div className="crd" style={{textAlign:'center',padding:14}}><div style={{fontSize:24,fontWeight:900,color:'var(--sa)'}}>{stats.total}</div><div style={{fontSize:10,color:'var(--ts)',marginTop:3}}>Total</div></div>
      <div className="crd" style={{textAlign:'center',padding:14}}><div style={{fontSize:24,fontWeight:900,color:'var(--em)'}}>{stats.paid}</div><div style={{fontSize:10,color:'var(--ts)',marginTop:3}}>✅ Paid</div></div>
      <div className="crd" style={{textAlign:'center',padding:14}}><div style={{fontSize:24,fontWeight:900,color:'var(--g)'}}>{stats.partial}</div><div style={{fontSize:10,color:'var(--ts)',marginTop:3}}>⚠️ Partial</div></div>
      <div className="crd" style={{textAlign:'center',padding:14}}><div style={{fontSize:24,fontWeight:900,color:'var(--rb)'}}>{stats.unpaid}</div><div style={{fontSize:10,color:'var(--ts)',marginTop:3}}>❌ Unpaid</div></div>
    </div>
    <div style={{display:'flex',gap:12,marginBottom:18,flexWrap:'wrap'}}>
      <div className="crd" style={{flex:1,padding:'10px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{color:'var(--ts)',fontSize:12}}>Due</span><span style={{fontSize:18,fontWeight:900,color:'var(--ro)'}}>{fmt(stats.due)}</span></div>
      <div className="crd" style={{flex:1,padding:'10px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{color:'var(--ts)',fontSize:12}}>Collected</span><span style={{fontSize:18,fontWeight:900,color:'var(--em)'}}>{fmt(stats.coll)}</span></div>
      <div className="crd" style={{flex:1,padding:'10px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{color:'var(--ts)',fontSize:12}}>Remaining</span><span style={{fontSize:18,fontWeight:900,color:'var(--rb)'}}>{fmt(stats.due-stats.coll)}</span></div>
    </div>
    <div className="crd" style={{padding:0,overflow:'hidden'}}>
      <div className="tbw"><table className="tbl"><thead><tr>
        <th>#</th><th>Member</th><th>Location</th><th>Chitti</th><th>RD</th><th>Total</th><th>Paid</th><th>Status</th><th>Action</th>
      </tr></thead><tbody>
        {rows.length===0?<tr><td colSpan={9} style={{textAlign:'center',padding:36,color:'var(--ts)'}}>No members</td></tr>
        :rows.map((r,i)=>{const pa=r.pay?Number(r.pay.chittiAmount||0)+Number(r.pay.rdAmount||0):0;return(
          <tr key={r.member.id}>
            <td style={{color:'var(--ts)',fontSize:11}}>{i+1}</td>
            <td><div style={{fontWeight:700,color:'var(--g)',fontSize:13,cursor:'pointer'}} onClick={()=>nav('detail',r.member.id)}>{cap(r.member.name)}</div>{r.member.nickname&&<div style={{fontSize:10,color:'var(--tl)'}}>{r.member.nickname}</div>}</td>
            <td style={{color:'var(--ts)',fontSize:11}}>{r.member.location||'—'}</td>
            <td style={{color:'var(--sa)',fontWeight:600,fontSize:12}}>{fmt(r.cd)}</td>
            <td style={{color:'var(--vi)',fontWeight:600,fontSize:12}}>{fmt(r.rd2)}</td>
            <td style={{color:'var(--g)',fontWeight:800,fontSize:13}}>{fmt(r.tot)}</td>
            <td style={{color:pa>0?'var(--em)':'var(--ts)',fontWeight:600,fontSize:12}}>{pa>0?fmt(pa):'—'}</td>
            <td><span className={`bdg bdg-${r.st==='paid'?'p':r.st==='partial'?'pt':'u'}`}>{r.st==='paid'?'✅':r.st==='partial'?'⚠️':'❌'} {r.st.charAt(0).toUpperCase()+r.st.slice(1)}</span></td>
            <td><button className="btn btn-o btn-xs" onClick={()=>setER(r)}>Update</button></td>
          </tr>
        )})}
      </tbody></table></div>
    </div>
    {editRow&&<PMdl row={editRow} month={sel} onSave={(s,a,b)=>savePay(editRow.member.id,s,a,b)} onClose={()=>setER(null)}/>}
  </div>);
}

/* ── Payment Modal ── */
function PMdl({row,month,onSave,onClose}){
  const [st,sSt]=useState(row.pay?.status||'unpaid');
  const [ca,sCa]=useState(String(row.pay?.chittiAmount||''));
  const [ra,sRa]=useState(String(row.pay?.rdAmount||''));
  const pt=Number(ca||0)+Number(ra||0);
  return(<div className="ov" onClick={onClose}><div className="mdl" onClick={e=>e.stopPropagation()}>
    <div className="mdl-t">💸 Update Payment</div>
    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
      <div style={{width:40,height:40,borderRadius:10,background:'rgba(240,180,41,.15)',border:'1px solid var(--bdb)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,color:'var(--g)',fontSize:14}}>{ini(row.member.name)}</div>
      <div><div style={{fontWeight:700,color:'var(--g)',fontSize:16}}>{cap(row.member.name)}</div><div style={{fontSize:11,color:'var(--ts)'}}>{mLbl(month)} · Due: {fmt(row.tot)}</div></div>
    </div>
    <div className="fg"><label className="fl">Chitti Paid (₹) <span style={{color:'var(--ts)',fontWeight:400,textTransform:'none',letterSpacing:0}}>— due {fmt(row.cd)}</span></label><input className="fi" type="number" value={ca} onChange={e=>sCa(e.target.value)} placeholder="0"/></div>
    <div className="fg"><label className="fl">RD Paid (₹) <span style={{color:'var(--ts)',fontWeight:400,textTransform:'none',letterSpacing:0}}>— due {fmt(row.rd2)}</span></label><input className="fi" type="number" value={ra} onChange={e=>sRa(e.target.value)} placeholder="0"/></div>
    <div className="fg" style={{marginBottom:6}}><label className="fl">Status</label><select className="fi" value={st} onChange={e=>sSt(e.target.value)}><option value="paid">✅ Paid</option><option value="partial">⚠️ Partial</option><option value="unpaid">❌ Unpaid</option></select></div>
    {pt>0&&<div style={{marginBottom:14,padding:'8px 12px',background:'rgba(6,214,160,.08)',borderRadius:8,fontSize:13}}>
      <span style={{color:'var(--ts)'}}>Recording: </span><span className="te" style={{fontWeight:700}}>{fmt(pt)}</span>
      {pt<row.tot&&<span className="tr2" style={{fontSize:11,marginLeft:8}}>(Balance: {fmt(row.tot-pt)})</span>}
    </div>}
    <div className="mdl-a"><button className="btn btn-gh btn-f" onClick={onClose}>Cancel</button><button className="btn btn-g btn-f" onClick={()=>onSave(st,ca,ra)}>Save</button></div>
  </div></div>);
}

  const [showReminder,setSR]=useState(false);
  const [showEditMsg,setSEM]=useState(false);
  const [rk,sRk]=useState(0);

  const nav=(p,d)=>{sPg(p);sDt(d??null);sRk(k=>k+1);window.scrollTo({top:0,behavior:'smooth'})};
  const notify=n=>sNtf(n);

  return(<>
    <Hdr
      nav={nav}
      onReminder={()=>setSR(true)}
      onEditMsg={()=>setSEM(true)}
      currentPage={pg}
    />
    {pg==='dash'&&<Dash key={rk} nav={nav} notify={notify}/>}
    {pg==='add'&&<MForm key={rk} memberId={null} nav={nav} notify={notify}/>}
    {pg==='edit'&&<MForm key={rk} memberId={dt} nav={nav} notify={notify}/>}
    {pg==='detail'&&<MDetail key={rk} memberId={dt} nav={nav} notify={notify}/>}
    {pg==='monthly'&&<Monthly key={rk} nav={nav} notify={notify}/>}
    {showReminder&&<ReminderModal onClose={()=>setSR(false)} notify={notify}/>}
    {showEditMsg&&<EditReminderModal onClose={()=>setSEM(false)} notify={notify}/>}
    <Ntf n={ntf} onClose={()=>sNtf(null)}/>
  </>);
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
