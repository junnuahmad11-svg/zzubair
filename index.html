          <div style={{fontSize:11,fontWeight:700,color:'var(--g)',textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>💰 Chitti Amount</div>
          <div className="bn tg" style={{marginBottom:12}}>{fmt(cT)}</div>
          {chittis.length===0
            ?<div style={{color:'var(--ts)',fontSize:12}}>No chittis</div>
            :chittis.map(c=>{
              const period=getPeriod(c.chittiNumber);
              return(
                <div key={c.id} style={{padding:'6px 0',borderBottom:'1px solid rgba(240,180,41,.1)'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                    <span style={{color:'var(--ts)',fontSize:12,display:'flex',alignItems:'center',gap:4,flexWrap:'wrap'}}>
                      #{c.chittiNumber}
                      {period&&<span className="pb">{period}</span>}
                    </span>
                    <span style={{color:'var(--gl)',fontWeight:700,fontSize:13}}>{fmt(c.amount)}</span>
                  </div>
                </div>
              );
            })
          }
        </div>

        {/* RD */}
        <div className="crd crd-v">
          <div style={{fontSize:11,fontWeight:700,color:'var(--vi)',textTransform:'uppercase',letterSpacing:1,marginBottom:12}}>💳 RD Amount</div>
          <div className="bn tv" style={{marginBottom:12}}>{fmt(rT)}</div>
          {rd.length===0
            ?<div style={{color:'var(--ts)',fontSize:12}}>No RD entries</div>
            :rd.map(r=>(
              <div key={r.id} style={{display:'flex',justifyContent:'space-between',padding:'6px 0',borderBottom:'1px solid rgba(177,133,219,.1)',fontSize:13}}>
                <span style={{color:'var(--ts)'}}>Monthly</span>
                <span style={{color:'var(--vi)',fontWeight:700}}>{fmt(r.amount)}</span>
              </div>
            ))
          }
          <div style={{marginTop:10,padding:'8px 11px',background:'rgba(177,133,219,.1)',borderRadius:7,fontSize:12}}>
            <span style={{color:'var(--ts)'}}>Total/Month: </span>
            <span style={{color:'var(--vi)',fontWeight:800}}>{fmt(tot)}</span>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div className="crd">
        <div className="tabs" style={{maxWidth:320,marginBottom:15}}>
          {['chittis','rd','payments'].map(t=>(
            <button key={t} className={`tab ${dtab===t?'on':''}`} onClick={()=>setDt(t)}>
              {t==='chittis'?'🎟 Chittis':t==='rd'?'💳 RD':'💸 Payments'}
            </button>
          ))}
        </div>

        {dtab==='chittis'&&(
          chittis.length===0
            ?<div className="emp"><div className="emp-i">🎟</div><div className="emp-t">No chittis</div></div>
            :<div style={{display:'flex',flexDirection:'column',gap:6}}>
              {chittis.map(c=>{
                const period=getPeriod(c.chittiNumber);
                return(
                  <div key={c.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'11px 13px',background:'var(--bg2)',borderRadius:9,border:'1px solid var(--bd)',gap:8,flexWrap:'wrap'}}>
                    <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                      <span style={{fontWeight:600,fontSize:13}}>Chitti #{c.chittiNumber}</span>
                      {period&&<span className="pb">{period}</span>}
                    </div>
                    <span style={{fontWeight:800,fontSize:15,color:'var(--g)'}}>{fmt(c.amount)}</span>
                  </div>
                );
              })}
              <div style={{display:'flex',justifyContent:'space-between',padding:'10px 13px',background:'rgba(240,180,41,.08)',borderRadius:9,border:'1px solid rgba(240,180,41,.2)'}}>
                <span style={{fontWeight:700,color:'var(--g)'}}>Total</span>
                <span style={{fontWeight:900,fontSize:16,color:'var(--g)'}}>{fmt(cT)}</span>
              </div>
            </div>
        )}

        {dtab==='rd'&&(
          rd.length===0
            ?<div className="emp"><div className="emp-i">💳</div><div className="emp-t">No RD</div></div>
            :<div style={{display:'flex',flexDirection:'column',gap:6}}>
              {rd.map(r=>(
                <div key={r.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'11px 13px',background:'var(--bg2)',borderRadius:9,border:'1px solid rgba(177,133,219,.25)'}}>
                  <span style={{fontWeight:600,fontSize:13}}>Monthly RD</span>
                  <span style={{fontWeight:800,fontSize:15,color:'var(--vi)'}}>{fmt(r.amount)}</span>
                </div>
              ))}
            </div>
        )}

        {dtab==='payments'&&(
          pay.length===0
            ?<div className="emp"><div className="emp-i">💸</div><div className="emp-t">No records</div><div className="emp-s">Use Monthly Summary to add payments</div></div>
            :<div style={{display:'flex',flexDirection:'column',gap:6}}>
              {pay.map(p=>(
                <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'11px 13px',background:'var(--bg2)',borderRadius:9,border:'1px solid var(--bd)',flexWrap:'wrap',gap:8}}>
                  <div>
                    <div style={{fontWeight:700,fontSize:13}}>{mLbl(p.month)}</div>
                    <div style={{fontSize:11,color:'var(--ts)',marginTop:2}}>Chitti: {fmt(p.chittiAmount)} · RD: {fmt(p.rdAmount)}</div>
                  </div>
                  <span className={`bdg bdg-${p.status==='paid'?'p':p.status==='partial'?'pt':'u'}`}>
                    {p.status==='paid'?'✅ Paid':p.status==='partial'?'⚠️ Partial':'❌ Unpaid'}
                  </span>
                </div>
              ))}
            </div>
        )}
      </div>
    </div>
  );
}

/* ─── Monthly Summary ────────────────────────────────── */
function Monthly({nav,notify}){
  const [sel,setSel]=useState(curM());
  const [members,setM]=useState([]);
  const [chittis,setC]=useState([]);
  const [rd,setR]=useState([]);
  const [payments,setP]=useState([]);
  const [sort,setSort]=useState('name');
  const [editRow,setER]=useState(null);
  const [sq,setSq]=useState('');

  useEffect(()=>{
    const sync=()=>{
      setM(DB.g('members').filter(m=>m.status==='active'));
      setC(DB.g('chittis'));
      setR(DB.g('rdEntries'));
      setP(DB.g('payments'));
    };
    sync();
    window.addEventListener('focus',sync);
    return()=>window.removeEventListener('focus',sync);
  },[]);

  const months=useMemo(()=>{
    const r=[];const n=new Date();
    for(let i=0;i<24;i++){
      const d=new Date(n.getFullYear(),n.getMonth()-i,1);
      r.push(d.toISOString().slice(0,7));
    }
    return r;
  },[]);

  const ct=mId=>chittis.filter(c=>c.memberId===mId).reduce((s,c)=>s+Number(c.amount||0),0);
  const rt=mId=>rd.filter(r=>r.memberId===mId).reduce((s,r)=>s+Number(r.amount||0),0);

  const rows=useMemo(()=>{
    const lq=sq.toLowerCase().trim();
    let r=members
      .filter(m=>!lq||(
        m.name.toLowerCase().includes(lq)||
        (m.location||'').toLowerCase().includes(lq)||
        (m.nickname||'').toLowerCase().includes(lq)
      ))
      .map(m=>{
        const p=payments.find(pp=>pp.memberId===m.id&&pp.month===sel);
        const cd=ct(m.id),rd2=rt(m.id),tot=cd+rd2;
        const st=p?p.status:'unpaid';
        return{member:m,cd,rd2,tot,pay:p,st};
      });
    if(sort==='name')r.sort((a,b)=>a.member.name.localeCompare(b.member.name));
    else if(sort==='status'){const o={paid:0,partial:1,unpaid:2};r.sort((a,b)=>o[a.st]-o[b.st])}
    else if(sort==='amt')r.sort((a,b)=>b.tot-a.tot);
    return r;
  },[members,chittis,rd,payments,sel,sort,sq]);

  const stats=useMemo(()=>({
    total:rows.length,
    paid:rows.filter(r=>r.st==='paid').length,
    partial:rows.filter(r=>r.st==='partial').length,
    unpaid:rows.filter(r=>r.st==='unpaid').length,
    coll:rows.reduce((s,r)=>s+(r.pay?Number(r.pay.chittiAmount||0)+Number(r.pay.rdAmount||0):0),0),
    due:rows.reduce((s,r)=>s+r.tot,0),
  }),[rows]);

  const savePay=(mId,status,ca,ra2)=>{
    let all=DB.g('payments');
    const ex=all.find(p=>p.memberId===mId&&p.month===sel);
    if(ex){
      all=all.map(p=>p.id===ex.id?{...p,status,chittiAmount:Number(ca||0),rdAmount:Number(ra2||0),updatedAt:new Date().toISOString()}:p);
    }else{
      all.push({id:Date.now(),memberId:mId,month:sel,chittiAmount:Number(ca||0),rdAmount:Number(ra2||0),status,createdAt:new Date().toISOString()});
    }
    DB.s('payments',all);
    setP(DB.g('payments'));
    setER(null);
    notify({t:'success',m:'Payment updated!'});
  };

  return(
    <div className="pg">
      <button className="bk" onClick={()=>nav('dash')}>← Dashboard</button>
      <div style={{margin:'14px 0 20px'}}>
        <h1 style={{fontSize:22,fontWeight:800}} className="tgg">Monthly Summary</h1>
      </div>

      {/* Controls */}
      <div style={{display:'flex',gap:9,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
        <select className="msel" value={sel} onChange={e=>setSel(e.target.value)}>
          {months.map(m=><option key={m} value={m}>{mLbl(m)}</option>)}
        </select>
        <select className="msel" value={sort} onChange={e=>setSort(e.target.value)}>
          <option value="name">A–Z</option>
          <option value="status">By Status</option>
          <option value="amt">By Amount</option>
        </select>
        <div style={{flex:1,minWidth:150,position:'relative'}}>
          <span style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'var(--ts)',fontSize:13}}>🔍</span>
          <input className="msel" style={{paddingLeft:32,width:'100%'}} placeholder="Search…" value={sq} onChange={e=>setSq(e.target.value)}/>
        </div>
      </div>

      {/* Stats */}
      <div className="g4" style={{marginBottom:14}}>
        <div className="crd" style={{textAlign:'center',padding:13}}><div style={{fontSize:22,fontWeight:900,color:'var(--sa)'}}>{stats.total}</div><div style={{fontSize:10,color:'var(--ts)',marginTop:3}}>Total</div></div>
        <div className="crd" style={{textAlign:'center',padding:13}}><div style={{fontSize:22,fontWeight:900,color:'var(--em)'}}>{stats.paid}</div><div style={{fontSize:10,color:'var(--ts)',marginTop:3}}>✅ Paid</div></div>
        <div className="crd" style={{textAlign:'center',padding:13}}><div style={{fontSize:22,fontWeight:900,color:'var(--g)'}}>{stats.partial}</div><div style={{fontSize:10,color:'var(--ts)',marginTop:3}}>⚠️ Partial</div></div>
        <div className="crd" style={{textAlign:'center',padding:13}}><div style={{fontSize:22,fontWeight:900,color:'var(--rb)'}}>{stats.unpaid}</div><div style={{fontSize:10,color:'var(--ts)',marginTop:3}}>❌ Unpaid</div></div>
      </div>

      {/* Totals row */}
      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
        <div className="crd" style={{flex:1,padding:'9px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{color:'var(--ts)',fontSize:12}}>Total Due</span>
          <span style={{fontSize:17,fontWeight:900,color:'var(--ro)'}}>{fmt(stats.due)}</span>
        </div>
        <div className="crd" style={{flex:1,padding:'9px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{color:'var(--ts)',fontSize:12}}>Collected</span>
          <span style={{fontSize:17,fontWeight:900,color:'var(--em)'}}>{fmt(stats.coll)}</span>
        </div>
        <div className="crd" style={{flex:1,padding:'9px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{color:'var(--ts)',fontSize:12}}>Remaining</span>
          <span style={{fontSize:17,fontWeight:900,color:'var(--rb)'}}>{fmt(stats.due-stats.coll)}</span>
        </div>
      </div>

      {/* Table */}
      <div className="crd" style={{padding:0,overflow:'hidden'}}>
        <div className="tbw">
          <table className="tbl">
            <thead>
              <tr>
                <th>#</th><th>Member</th><th>Location</th>
                <th>Chitti</th><th>RD</th><th>Total</th>
                <th>Paid</th><th>Status</th><th>Action</th>
              </tr>
            </thead>
            <tbody>
              {rows.length===0
                ?<tr><td colSpan={9} style={{textAlign:'center',padding:36,color:'var(--ts)'}}>No members</td></tr>
                :rows.map((r,i)=>{
                  const pa=r.pay?Number(r.pay.chittiAmount||0)+Number(r.pay.rdAmount||0):0;
                  return(
                    <tr key={r.member.id}>
                      <td style={{color:'var(--ts)',fontSize:11}}>{i+1}</td>
                      <td>
                        <div style={{fontWeight:700,color:'var(--g)',fontSize:12,cursor:'pointer'}} onClick={()=>nav('detail',r.member.id)}>{cap(r.member.name)}</div>
                        {r.member.nickname&&<div style={{fontSize:10,color:'var(--tl)'}}>{r.member.nickname}</div>}
                      </td>
                      <td style={{color:'var(--ts)',fontSize:11}}>{r.member.location||'—'}</td>
                      <td style={{color:'var(--sa)',fontWeight:600,fontSize:12}}>{fmt(r.cd)}</td>
                      <td style={{color:'var(--vi)',fontWeight:600,fontSize:12}}>{fmt(r.rd2)}</td>
                      <td style={{color:'var(--g)',fontWeight:800,fontSize:13}}>{fmt(r.tot)}</td>
                      <td style={{color:pa>0?'var(--em)':'var(--ts)',fontWeight:600,fontSize:12}}>{pa>0?fmt(pa):'—'}</td>
                      <td>
                        <span className={`bdg bdg-${r.st==='paid'?'p':r.st==='partial'?'pt':'u'}`}>
                          {r.st==='paid'?'✅':r.st==='partial'?'⚠️':'❌'}&nbsp;{r.st.charAt(0).toUpperCase()+r.st.slice(1)}
                        </span>
                      </td>
                      <td><button className="btn btn-o btn-xs" onClick={()=>setER(r)}>Update</button></td>
                    </tr>
                  );
                })
              }
            </tbody>
          </table>
        </div>
      </div>

      {editRow&&<PMdl row={editRow} month={sel} onSave={(s,a,b)=>savePay(editRow.member.id,s,a,b)} onClose={()=>setER(null)}/>}
    </div>
  );
}

/* ─── Payment Update Modal ───────────────────────────── */
function PMdl({row,month,onSave,onClose}){
  const [st,sSt]=useState(row.pay?.status||'unpaid');
  const [ca,sCa]=useState(String(row.pay?.chittiAmount||''));
  const [ra,sRa]=useState(String(row.pay?.rdAmount||''));
  const pt=Number(ca||0)+Number(ra||0);
  return(
    <div className="ov" onClick={onClose}>
      <div className="mdl" onClick={e=>e.stopPropagation()}>
        <div className="mdl-t">💸 Update Payment</div>
        <div style={{display:'flex',alignItems:'center',gap:11,marginBottom:16}}>
          <div style={{width:38,height:38,borderRadius:10,background:'rgba(240,180,41,.15)',border:'1px solid var(--bdb)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,color:'var(--g)',fontSize:13,flexShrink:0}}>{ini(row.member.name)}</div>
          <div>
            <div style={{fontWeight:700,color:'var(--g)',fontSize:15}}>{cap(row.member.name)}</div>
            <div style={{fontSize:11,color:'var(--ts)'}}>{mLbl(month)} · Due: {fmt(row.tot)}</div>
          </div>
        </div>
        <div className="fg">
          <label className="fl">Chitti Paid (₹) <span style={{color:'var(--ts)',fontWeight:400,textTransform:'none',letterSpacing:0}}>due: {fmt(row.cd)}</span></label>
          <input className="fi" type="number" value={ca} onChange={e=>sCa(e.target.value)} placeholder="0"/>
        </div>
        <div className="fg">
          <label className="fl">RD Paid (₹) <span style={{color:'var(--ts)',fontWeight:400,textTransform:'none',letterSpacing:0}}>due: {fmt(row.rd2)}</span></label>
          <input className="fi" type="number" value={ra} onChange={e=>sRa(e.target.value)} placeholder="0"/>
        </div>
        <div className="fg" style={{marginBottom:8}}>
          <label className="fl">Status</label>
          <select className="fi" value={st} onChange={e=>sSt(e.target.value)}>
            <option value="paid">✅ Paid</option>
            <option value="partial">⚠️ Partial</option>
            <option value="unpaid">❌ Unpaid</option>
          </select>
        </div>
        {pt>0&&(
          <div style={{marginBottom:14,padding:'8px 11px',background:'rgba(6,214,160,.08)',borderRadius:8,fontSize:12}}>
            <span style={{color:'var(--ts)'}}>Recording: </span>
            <span className="te" style={{fontWeight:700}}>{fmt(pt)}</span>
            {pt<row.tot&&<span className="tr2" style={{fontSize:11,marginLeft:8}}>Balance: {fmt(row.tot-pt)}</span>}
          </div>
        )}
        <div className="mdl-a">
          <button className="btn btn-gh btn-f" onClick={onClose}>Cancel</button>
          <button className="btn btn-g btn-f" onClick={()=>onSave(st,ca,ra)}>Save</button>
        </div>
      </div>
    </div>
  );
}

/* ─── App Root ───────────────────────────────────────── */
function App(){
  const [pg,sPg]=useState('dash');
  const [dt,sDt]=useState(null);
  const [ntf,sNtf]=useState(null);
  const [showReminder,setSR]=useState(false);
  const [showEditMsg,setSEM]=useState(false);
  const [rk,sRk]=useState(0);

  const nav=useCallback((p,d=null)=>{
    sPg(p);sDt(d);sRk(k=>k+1);
    window.scrollTo({top:0,behavior:'smooth'});
  },[]);

  const notify=useCallback(n=>sNtf(n),[]);

  const openReminder=useCallback(()=>setSR(true),[]);
  const openEditMsg=useCallback(()=>setSEM(true),[]);

  return(
    <>
      <Hdr nav={nav} pg={pg} onReminder={openReminder} onEditMsg={openEditMsg}/>
      {pg==='dash'   &&<Dash    key={`dash-${rk}`}   nav={nav}/>}
      {pg==='add'    &&<MForm   key={`add-${rk}`}    memberId={null} nav={nav} notify={notify}/>}
      {pg==='edit'   &&<MForm   key={`edit-${rk}`}   memberId={dt}  nav={nav} notify={notify}/>}
      {pg==='detail' &&<MDetail key={`detail-${rk}`} memberId={dt}  nav={nav} notify={notify}/>}
      {pg==='monthly'&&<Monthly key={`monthly-${rk}`}              nav={nav} notify={notify}/>}
      {showReminder&&<ReminderModal onClose={()=>setSR(false)} notify={notify}/>}
      {showEditMsg &&<EditMsgModal  onClose={()=>setSEM(false)} notify={notify}/>}
      <Ntf n={ntf} onClose={()=>sNtf(null)}/>
    </>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>

<style>
:root{
  --bg:#080810;--bg2:#0e0e1c;--bgc:#111120;--bgch:#16162a;--bgi:#0a0a18;
  --g:#f0b429;--gl:#ffd166;--gd:#c88a00;--am:#ff9f1c;

<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useRef}=React;

/* ─── Helpers ─────────────────────────────────────────── */
const fmt=n=>'₹'+Number(n||0).toLocaleString('en-IN');
const cap=s=>s?s.split(' ').map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(' '):'';
const ini=n=>n?n.trim().split(/\s+/).map(w=>w[0]).join('').toUpperCase().slice(0,2):'?';
const curM=()=>new Date().toISOString().slice(0,7);
const mLbl=ym=>{
  try{const[y,m]=ym.split('-');return new Date(Number(y),Number(m)-1,1).toLocaleString('en',{month:'long',year:'numeric'})}
  catch{return ym}
};

/* ─── Chitti Period Map ───────────────────────────────── */
const PERIODS={
  '2':'N/A',
  '3':'DEC24-JUL26',
  '4':'APR25-Ongoing',
  '5':'MAY25-Ongoing',
  '6':'SEP25-APR27',
  '8':'FEB25-Ongoing',
  '10':'JAN25-AUG26',
  '11':'JUN25-JAN27',
  '12':'JUL25-FEB27',
  '13':'AUG25-MAR27',
  '14':'NOV25-JUN27',
  '15':'DEC25-JUL27',
  '16':'JAN26-AUG27',
  '17':'MAR26-OCT27',
  '18':'APR26-NOV27',
  '19':'MAY26-DEC27',
  '20':'JUN26-JAN28',
};

function getPeriod(chittiNo){
  if(!chittiNo)return null;
  const raw=String(chittiNo);
  // strip any trailing letters or special chars, keep digits only
  const base=raw.replace(/[^0-9]/g,'');
  const p=PERIODS[base];
  return(p&&p!=='N/A')?p:null;
}

function chittiLabel(chittiNo){
  const p=getPeriod(chittiNo);
  return p?`Chitti #${chittiNo} (${p})`:`Chitti #${chittiNo}`;
}

/* ─── Default message template ───────────────────────── */
const DEFAULT_TPL=
`Dear {name},

Assalamu Alaikum! I hope this message finds you well.

Here are your payment details for the Chitti:

{chittiLines}

📊 Total Amount Due: {total}

Kindly arrange the payment at your earliest convenience.

JazakAllahu Khairan!

Best regards,
Z — Chitti Management`;

/* ─── DB ──────────────────────────────────────────────── */
const DB={
  g:k=>{try{return JSON.parse(localStorage.getItem('zc_'+k))||[]}catch{return[]}},
  s:(k,v)=>{try{localStorage.setItem('zc_'+k,JSON.stringify(v))}catch(e){console.error('DB.s error',e)}},
  nid:k=>{const d=DB.g(k);return d.length?Math.max(...d.map(i=>Number(i.id)||0))+1:1},
  ver:()=>localStorage.getItem('zc_ver'),
  getTpl:()=>localStorage.getItem('reminderMessageTemplate')||'',
  setTpl:v=>localStorage.setItem('reminderMessageTemplate',v),
};

/* ─── Build WhatsApp message ─────────────────────────── */
function buildMsg(member,allChittis,allRd){
  const mc=allChittis.filter(c=>c.memberId===member.id);
  const mr=allRd.filter(r=>r.memberId===member.id);
  const cTotal=mc.reduce((s,c)=>s+Number(c.amount||0),0);
  const rTotal=mr.reduce((s,r)=>s+Number(r.amount||0),0);
  const total=cTotal+rTotal;
  // Chitti lines WITH period (Part 6)
  const cLines=mc.map(c=>`  🎟 ${chittiLabel(c.chittiNumber)}: ${fmt(c.amount)}`).join('\n');
  const rLine=mr.length?`\n  💳 RD (Monthly): ${fmt(rTotal)}`:'';
  const allLines=(cLines+(rLine||'')).trim()||'  (No chitti entries)';

  const saved=DB.getTpl().trim();
  const tpl=saved||DEFAULT_TPL;

  return tpl
    .replace(/\{name\}/g,cap(member.name))
    .replace(/\{chittiLines\}/g,allLines)
    .replace(/\{total\}/g,fmt(total));
}

/* ─── SEED ────────────────────────────────────────────── */
function seed(){
  if(DB.ver()==='4')return;

/* ─── Notification ───────────────────────────────────── */
function Ntf({n,onClose}){
  useEffect(()=>{
    if(!n)return;
    const t=setTimeout(onClose,3500);
    return()=>clearTimeout(t);
  },[n,onClose]);
  if(!n)return null;
  const icon=n.t==='success'?'✅':n.t==='error'?'❌':'ℹ️';
  return<div className={`ntf ntf-${n.t==='success'?'s':n.t==='error'?'e':'i'}`}><span>{icon}</span><span>{n.m}</span></div>;
}

/* ─── Reminder Modal ─────────────────────────────────── */
function ReminderModal({onClose,notify}){
  const allMembers=DB.g('members');
  const chittis=DB.g('chittis');
  const rd=DB.g('rdEntries');
  const payments=DB.g('payments');
  const cMonth=curM();

  const activeMembers=allMembers.filter(m=>m.status==='active');
  const withPhone=activeMembers.filter(m=>m.phone&&m.phone.replace(/\D/g,'').length>=10);
  const noPhone=activeMembers.filter(m=>!m.phone||m.phone.replace(/\D/g,'').length<10);

  const [selected,setSel]=useState(()=>new Set(withPhone.map(m=>m.id)));
  const [sending,setSending]=useState(false);
  const [sent,setSent]=useState(new Set());
  const [search,setSearch]=useState('');

  const ct=mId=>chittis.filter(c=>c.memberId===mId).reduce((s,c)=>s+Number(c.amount||0),0);
  const rt=mId=>rd.filter(r=>r.memberId===mId).reduce((s,r)=>s+Number(r.amount||0),0);
  const isPaid=mId=>{
    const p=payments.find(pp=>pp.memberId===mId&&pp.month===cMonth);
    return p&&p.status==='paid';
  };

  const unpaidWithPhone=withPhone.filter(m=>!isPaid(m.id));

  const toggle=id=>{
    if(sending)return;
    setSel(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n});
  };

  const filtered=useMemo(()=>{
    const lq=search.toLowerCase().trim();
    if(!lq)return withPhone;
    return withPhone.filter(m=>
      m.name.toLowerCase().includes(lq)||
      (m.nickname||'').toLowerCase().includes(lq)||
      (m.location||'').toLowerCase().includes(lq)
    );
  },[withPhone,search]);

  const sendAll=async()=>{
    const toSend=[...selected].map(id=>withPhone.find(m=>m.id===id)).filter(Boolean);
    if(!toSend.length)return;
    setSending(true);
    for(let i=0;i<toSend.length;i++){
      const m=toSend[i];
      const ph=m.phone.replace(/\D/g,'');
      const msg=buildMsg(m,chittis,rd);
      window.open(`https://wa.me/91${ph}?text=${encodeURIComponent(msg)}`,'_blank');
      setSent(prev=>new Set([...prev,m.id]));
      if(i<toSend.length-1)await new Promise(r=>setTimeout(r,1500));
    }
    setSending(false);
    notify({t:'success',m:`Sent to ${toSend.length} member${toSend.length>1?'s':''}!`});
  };

  return(
    <div className="ov" onClick={onClose}>
      <div className="mdl mdl-lg" onClick={e=>e.stopPropagation()}>
        <div className="mdl-t">📢 Send Payment Reminders</div>
        <p style={{fontSize:12,color:'var(--ts)',marginBottom:14,lineHeight:1.6}}>
          Only active members with phone numbers shown. Chitti periods auto-included.
        </p>
        {/* Quick select */}
        <div style={{display:'flex',gap:7,marginBottom:13,flexWrap:'wrap'}}>
          <button className="btn btn-g btn-xs" onClick={()=>setSel(new Set(withPhone.map(m=>m.id)))}>All ({withPhone.length})</button>
          <button className="btn btn-sa btn-xs" onClick={()=>setSel(new Set(unpaidWithPhone.map(m=>m.id)))}>Unpaid ({unpaidWithPhone.length})</button>
          <button className="btn btn-gh btn-xs" onClick={()=>setSel(new Set())}>None</button>
        </div>
        {/* Search */}
        <div className="swrp" style={{marginBottom:12}}>
          <span className="sico">🔍</span>
          <input className="sinp" style={{padding:'9px 13px 9px 40px',fontSize:13}} placeholder="Search…" value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        {/* Count */}
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:10,fontSize:12}}>
          <span style={{color:'var(--ts)'}}>
            📱 {withPhone.length} with phone &nbsp;|&nbsp;
            <span style={{color:'var(--g)',fontWeight:700}}>{selected.size} selected</span>
          </span>
          {noPhone.length>0&&<span style={{color:'var(--rb)'}}>{noPhone.length} no phone</span>}
        </div>
        {/* List */}
        <div style={{maxHeight:'38vh',overflowY:'auto',display:'flex',flexDirection:'column',gap:5,marginBottom:14,paddingRight:3}}>
          {filtered.length===0
            ?<div className="emp" style={{padding:24}}><div className="emp-t">No members found</div></div>
            :filtered.map(m=>{
              const isOn=selected.has(m.id);
              const isSent=sent.has(m.id);
              const paid=isPaid(m.id);
              const total=ct(m.id)+rt(m.id);
              return(
                <div key={m.id} className={`rem-item ${isOn?'sel':''}`} onClick={()=>toggle(m.id)}>
                  <div className={`chk ${isOn?'on':''}`}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
                      <span style={{fontWeight:700,fontSize:13,color:isOn?'var(--g)':'var(--tp)'}}>{cap(m.name)}</span>
                      {m.location&&<span style={{fontSize:11,color:'var(--ts)'}}>📍{m.location}</span>}
                      {paid&&<span className="bdg bdg-p" style={{fontSize:9}}>Paid</span>}
                      {isSent&&<span className="bdg bdg-a" style={{fontSize:9}}>✅Sent</span>}
                    </div>
                    <div style={{fontSize:11,color:'var(--ts)',marginTop:2}}>
                      📞{m.phone} &nbsp;·&nbsp; <span style={{color:'var(--g)',fontWeight:600}}>{fmt(total)}</span>
                    </div>
                  </div>
                </div>
              );
            })
          }
        </div>
        {sending&&(
          <div className="sending">
            <div className="sd-dot"/>
            <span>Sending… ({sent.size}/{selected.size})</span>
          </div>
        )}
        <div className="mdl-a">
          <button className="btn btn-gh btn-f" onClick={onClose} disabled={sending}>Close</button>
          <button
            className={`btn btn-w btn-f ${selected.size===0||sending?'btn-dis':''}`}
            onClick={sendAll}
          >
            💬 Send ({selected.size})
          </button>
        </div>
        {noPhone.length>0&&(
          <details style={{marginTop:12}}>
            <summary style={{fontSize:11,color:'var(--ts)',cursor:'pointer'}}>⚠️ {noPhone.length} without phone</summary>
            <div style={{marginTop:7,display:'flex',flexWrap:'wrap',gap:5}}>
              {noPhone.map(m=>(
                <span key={m.id} style={{fontSize:11,padding:'2px 7px',background:'rgba(239,35,60,.08)',border:'1px solid rgba(239,35,60,.2)',borderRadius:5,color:'var(--rb)'}}>{cap(m.name)}</span>
              ))}
            </div>
          </details>
        )}
      </div>
    </div>
  );
}

  const paidN=active.filter(m=>{const p=payments.find(pp=>pp.memberId===m.id&&pp.month===c);return p&&p.status==='paid'}).length;

    const lq=q.toLowerCase().trim();
    return members.filter(m=>{
      if(tab==='active'?m.status!=='active':m.status!=='quit')return false;
      if(!lq)return true;
      return(
        m.name.toLowerCase().includes(lq)||
        (m.nickname||'').toLowerCase().includes(lq)||
        (m.location||'').toLowerCase().includes(lq)
      );
    });
  },[members,q,tab]);

  return(
    <div className="pg">
      <div className="g4" style={{marginBottom:24}}>
        <SC icon="👥" label="Active Members" value={active.length} sub={`${members.filter(m=>m.status==='quit').length} past`} c="#f0b429"/>
        <SC icon="💰" label="Total Portfolio" value={fmt(grand)} sub="All chittis + RD" c="#4895ef"/>
        <SC icon="✅" label="Collected" value={fmt(coll)} sub={mLbl(c)} c="#06d6a0"/>
        <SC icon="⚠️" label="Pending" value={active.length-paidN} sub={`${paidN} paid`} c="#ef233c"/>
      </div>
      <div className="crd">
        <div className="sh">
          <div className="sh-t">Members <span>Directory</span><span className="cp">{filtered.length}</span></div>
          <button className="btn btn-g btn-sm" onClick={()=>nav('add')}>＋ Add</button>
        </div>
        <div className="swrp" style={{marginBottom:13}}>
          <span className="sico">🔍</span>
          <input className="sinp" placeholder="Search by name, nickname, or location…" value={q} onChange={e=>setQ(e.target.value)}/>
        </div>
        <div className="tabs" style={{marginBottom:14}}>
          <button className={`tab ${tab==='active'?'on':''}`} onClick={()=>setTab('active')}>
            🟢 Active<span className="cp">{members.filter(m=>m.status==='active').length}</span>
          </button>
          <button className={`tab ${tab==='quit'?'on':''}`} onClick={()=>setTab('quit')}>
            ⚫ Past<span className="cp">{members.filter(m=>m.status==='quit').length}</span>
          </button>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:7}}>
          {filtered.length===0
            ?<div className="emp"><div className="emp-i">🔎</div><div className="emp-t">{q?'No results':'No members'}</div></div>
            :filtered.map((m,i)=>{
              const tc=ct(m.id),tr2=rt(m.id);
              return(
                <div key={m.id} className="mc sra" style={{animationDelay:`${Math.min(i*10,200)}ms`}} onClick={()=>nav('detail',m.id)}>
                  <div className="mc-av">{ini(m.name)}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div className="mc-nm">{cap(m.name)}</div>
                    <div className="mc-sub">
                      {m.location&&<span>📍{m.location}</span>}
                      {m.nickname&&<span className="ttl">"{m.nickname}"</span>}
                      <span className={`bdg bdg-${m.status==='active'?'a':'q'}`}>
                        <span className={`dot dot-${m.status==='active'?'a':'q'}`}/>
                        {m.status==='active'?'Active':'Quit'}
                      </span>
                    </div>
                  </div>
                  <div className="mc-rt">
                    {tc>0&&<div className="ab"><div className="ab-l tg">Chitti</div><div className="ab-v tg">{fmt(tc)}</div></div>}
                    {tr2>0&&<div className="ab"><div className="ab-l tv">RD</div><div className="ab-v tv">{fmt(tr2)}</div></div>}
                    <div className="ab"><div className="ab-l tro">Total</div><div className="ab-v tro">{fmt(tc+tr2)}</div></div>
                  </div>
                </div>
              );
            })
          }
        </div>
      </div>
    </div>
  );
}

/* ─── Member Form ────────────────────────────────────── */
function MForm({memberId,nav,notify}){
  const isE=!!memberId;
  const [f,sF]=useState({name:'',nickname:'',phone:'',location:'',notes:'',status:'active'});
  const [ch,sCh]=useState([{num:'1',amt:''}]);
  const [ra,sRa]=useState('');
  const [er,sEr]=useState({});
  const [dm,sDm]=useState(false);

  useEffect(()=>{
    if(!isE)return;
    const m=DB.g('members').find(x=>x.id===memberId);
    if(!m)return;
    sF({name:m.name,nickname:m.nickname||'',phone:m.phone||'',location:m.location||'',notes:m.notes||'',status:m.status});
    const cs=DB.g('chittis').filter(x=>x.memberId===memberId);
    sCh(cs.length?cs.map(x=>({num:String(x.chittiNumber),amt:String(x.amount)})):[{num:'1',amt:''}]);
    const r=DB.g('rdEntries').find(x=>x.memberId===memberId);
    sRa(r?String(r.amount):'');
  },[memberId,isE]);

  const val=()=>{
    const e={};
    if(!f.name.trim())e.name='Required';
    if(f.phone&&!/^\d{10}$/.test(f.phone.replace(/\s/g,'')))e.phone='Must be 10 digits';
    ch.forEach((c,i)=>{if(c.amt&&(isNaN(Number(c.amt))||Number(c.amt)<=0))e[`c${i}`]='Invalid amount'});
    if(ra&&(isNaN(Number(ra))||Number(ra)<=0))e.rd='Invalid amount';
    sEr(e);
    return!Object.keys(e).length;
  };

  const save=()=>{
    if(!val())return;
    const now=new Date().toISOString();
    if(isE){
      DB.s('members',DB.g('members').map(m=>m.id===memberId?{...m,...f,updatedAt:now}:m));
      let aC=DB.g('chittis').filter(c=>c.memberId!==memberId);
      ch.filter(c=>c.amt&&Number(c.amt)>0).forEach((c,i)=>aC.push({id:Date.now()+i,memberId,chittiNumber:c.num||String(i+1),amount:Number(c.amt),createdAt:now}));
      DB.s('chittis',aC);
      let aR=DB.g('rdEntries').filter(r=>r.memberId!==memberId);
      if(ra&&Number(ra)>0)aR.push({id:Date.now(),memberId,amount:Number(ra),createdAt:now});
      DB.s('rdEntries',aR);
      notify({t:'success',m:'Member updated!'});
      nav('detail',memberId);
    }else{
      const nid=DB.nid('members');
      DB.s('members',[...DB.g('members'),{id:nid,...f,name:cap(f.name.trim()),createdAt:now}]);
      let aC=DB.g('chittis');
      ch.filter(c=>c.amt&&Number(c.amt)>0).forEach((c,i)=>aC.push({id:Date.now()+i,memberId:nid,chittiNumber:c.num||String(i+1),amount:Number(c.amt),createdAt:now}));
      DB.s('chittis',aC);
      let aR=DB.g('rdEntries');
      if(ra&&Number(ra)>0)aR.push({id:Date.now(),memberId:nid,amount:Number(ra),createdAt:now});
      DB.s('rdEntries',aR);
      notify({t:'success',m:'Member added!'});
      nav('dash');
    }
  };

  const del=()=>{
    DB.s('members',DB.g('members').filter(m=>m.id!==memberId));
    DB.s('chittis',DB.g('chittis').filter(c=>c.memberId!==memberId));
    DB.s('rdEntries',DB.g('rdEntries').filter(r=>r.memberId!==memberId));
    DB.s('payments',DB.g('payments').filter(p=>p.memberId!==memberId));
    notify({t:'success',m:'Member deleted.'});
    nav('dash');
  };

  return(
    <div className="pg" style={{maxWidth:680}}>
      {dm&&<Cfm danger title="🗑 Delete Member" text={`Delete "${cap(f.name)}" and all their data? This cannot be undone.`} onOk={del} onNo={()=>sDm(false)}/>}
      <button className="bk" onClick={()=>nav(isE?'detail':'dash',memberId)}>← Back</button>
      <div style={{margin:'14px 0 22px'}}>
        <h1 style={{fontSize:22,fontWeight:800}} className="tgg">{isE?'Edit Member':'New Member'}</h1>
      </div>
      <div className="fsec">
        <div className="fsec-t">👤 Personal Info</div>
        <div className="g2">
          <div className="fg">
            <label className="fl">Name *</label>
            <input className={`fi ${er.name?'er':''}`} placeholder="Full name" value={f.name} onChange={e=>sF(p=>({...p,name:e.target.value}))}/>
            {er.name&&<div className="fi-e">{er.name}</div>}
          </div>
          <div className="fg">
            <label className="fl">Nickname</label>
            <input className="fi" placeholder="Optional" value={f.nickname} onChange={e=>sF(p=>({...p,nickname:e.target.value}))}/>
          </div>
          <div className="fg">
            <label className="fl">Phone</label>
            <input className={`fi ${er.phone?'er':''}`} placeholder="10 digits" value={f.phone} onChange={e=>sF(p=>({...p,phone:e.target.value}))}/>
            {er.phone&&<div className="fi-e">{er.phone}</div>}
          </div>
          <div className="fg">
            <label className="fl">Location</label>
            <input className="fi" placeholder="e.g. TPT, C/O Basheer" value={f.location} onChange={e=>sF(p=>({...p,location:e.target.value}))}/>
          </div>
        </div>
        {isE&&(
          <div className="fg">
            <label className="fl">Status</label>
            <select className="fi" value={f.status} onChange={e=>sF(p=>({...p,status:e.target.value}))}>
              <option value="active">Active</option>
              <option value="quit">Quit</option>
            </select>
          </div>
        )}
        <div className="fg" style={{marginBottom:0,marginTop:10}}>
          <label className="fl">Notes</label>
          <textarea className="fi fi-ta" placeholder="Notes…" value={f.notes} onChange={e=>sF(p=>({...p,notes:e.target.value}))}/>
        </div>
      </div>

      <div className="fsec">
        <div className="fsec-t">🎟 Chitti Details</div>
        {ch.map((c,i)=>{
          const period=getPeriod(c.num);
          return(
            <div className="crow" key={i}>
              <div>
                {i===0&&<label className="fl">Chitti #</label>}
                <input className="fi" placeholder="#" value={c.num} onChange={e=>sCh(p=>p.map((x,j)=>j===i?{...x,num:e.target.value}:x))}/>
              </div>
              <div>
                {i===0&&<label className="fl" style={{display:'flex',alignItems:'center',gap:5}}>
                  Amount (₹) {period&&<span className="pb">{period}</span>}
                </label>}
                {i>0&&period&&<div style={{marginBottom:4}}><span className="pb">{period}</span></div>}
                <input className={`fi ${er[`c${i}`]?'er':''}`} type="number" placeholder="0" value={c.amt}
                  onChange={e=>sCh(p=>p.map((x,j)=>j===i?{...x,amt:e.target.value}:x))}/>
                {er[`c${i}`]&&<div className="fi-e">{er[`c${i}`]}</div>}
              </div>
              <div style={{paddingBottom:1}}>
                {ch.length>1&&<button className="btn btn-r btn-xs" style={{marginTop:i===0?18:0}} onClick={()=>sCh(p=>p.filter((_,j)=>j!==i))}>✕</button>}
              </div>
            </div>
          );
        })}
        <button className="btn btn-o btn-sm" onClick={()=>sCh(p=>[...p,{num:'',amt:''}])}>＋ Add Chitti</button>
      </div>

      <div className="fsec">
        <div className="fsec-t">💳 RD (Monthly)</div>
        <div className="fg" style={{marginBottom:0}}>
          <label className="fl">Monthly RD Amount (₹)</label>
          <input className={`fi ${er.rd?'er':''}`} type="number" placeholder="0" value={ra} onChange={e=>sRa(e.target.value)} style={{maxWidth:260}}/>
          {er.rd&&<div className="fi-e">{er.rd}</div>}
        </div>
      </div>

      <div style={{display:'flex',flexDirection:'column',gap:9}}>
        <button className="btn btn-e btn-f" onClick={save}>{isE?'✅ Update Member':'✅ Add Member'}</button>
        <button className="btn btn-gh btn-f" onClick={()=>nav(isE?'detail':'dash',memberId)}>Cancel</button>
        {isE&&<button className="btn btn-r btn-f" onClick={()=>sDm(true)}>🗑 Delete Member</button>}
      </div>
    </div>
  );
}

/* ─── Monthly Summary ────────────────────────────────── */
function Monthly({nav,notify}){
  const [sel,setSel]=useState(curM());
  const [members,setM]=useState([]);
  const [chittis,setC]=useState([]);
  const [rd,setR]=useState([]);
  const [payments,setP]=useState([]);
  const [sort,setSort]=useState('name');
  const [editRow,setER]=useState(null);
  const [sq,setSq]=useState('');

  useEffect(()=>{
    const sync=()=>{
      setM(DB.g('members').filter(m=>m.status==='active'));
      setC(DB.g('chittis'));
      setR(DB.g('rdEntries'));
      setP(DB.g('payments'));
    };
    sync();
    window.addEventListener('focus',sync);
    return()=>window.removeEventListener('focus',sync);
  },[]);

  const months=useMemo(()=>{
    const r=[];const n=new Date();
    for(let i=0;i<24;i++){
      const d=new Date(n.getFullYear(),n.getMonth()-i,1);
      r.push(d.toISOString().slice(0,7));
    }
    return r;
  },[]);

  const ct=mId=>chittis.filter(c=>c.memberId===mId).reduce((s,c)=>s+Number(c.amount||0),0);
  const rt=mId=>rd.filter(r=>r.memberId===mId).reduce((s,r)=>s+Number(r.amount||0),0);

  const rows=useMemo(()=>{
    const lq=sq.toLowerCase().trim();
    let r=members
      .filter(m=>!lq||(
        m.name.toLowerCase().includes(lq)||
        (m.location||'').toLowerCase().includes(lq)||
        (m.nickname||'').toLowerCase().includes(lq)
      ))
      .map(m=>{
        const p=payments.find(pp=>pp.memberId===m.id&&pp.month===sel);
        const cd=ct(m.id),rd2=rt(m.id),tot=cd+rd2;
        const st=p?p.status:'unpaid';
        return{member:m,cd,rd2,tot,pay:p,st};
      });
    if(sort==='name')r.sort((a,b)=>a.member.name.localeCompare(b.member.name));
    else if(sort==='status'){const o={paid:0,partial:1,unpaid:2};r.sort((a,b)=>o[a.st]-o[b.st])}
    else if(sort==='amt')r.sort((a,b)=>b.tot-a.tot);
    return r;
  },[members,chittis,rd,payments,sel,sort,sq]);

  const stats=useMemo(()=>({
    total:rows.length,
    paid:rows.filter(r=>r.st==='paid').length,
    partial:rows.filter(r=>r.st==='partial').length,
    unpaid:rows.filter(r=>r.st==='unpaid').length,
    coll:rows.reduce((s,r)=>s+(r.pay?Number(r.pay.chittiAmount||0)+Number(r.pay.rdAmount||0):0),0),
    due:rows.reduce((s,r)=>s+r.tot,0),
  }),[rows]);

  const savePay=(mId,status,ca,ra2)=>{
    let all=DB.g('payments');
    const ex=all.find(p=>p.memberId===mId&&p.month===sel);
    if(ex){
      all=all.map(p=>p.id===ex.id?{...p,status,chittiAmount:Number(ca||0),rdAmount:Number(ra2||0),updatedAt:new Date().toISOString()}:p);
    }else{
      all.push({id:Date.now(),memberId:mId,month:sel,chittiAmount:Number(ca||0),rdAmount:Number(ra2||0),status,createdAt:new Date().toISOString()});
    }
    DB.s('payments',all);
    setP(DB.g('payments'));
    setER(null);
    notify({t:'success',m:'Payment updated!'});
  };

  return(
    <div className="pg">
      <button className="bk" onClick={()=>nav('dash')}>← Dashboard</button>
      <div style={{margin:'14px 0 20px'}}>
        <h1 style={{fontSize:22,fontWeight:800}} className="tgg">Monthly Summary</h1>
      </div>

      {/* Controls */}
      <div style={{display:'flex',gap:9,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
        <select className="msel" value={sel} onChange={e=>setSel(e.target.value)}>
          {months.map(m=><option key={m} value={m}>{mLbl(m)}</option>)}
        </select>
        <select className="msel" value={sort} onChange={e=>setSort(e.target.value)}>
          <option value="name">A–Z</option>
          <option value="status">By Status</option>
          <option value="amt">By Amount</option>
        </select>
        <div style={{flex:1,minWidth:150,position:'relative'}}>
          <span style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'var(--ts)',fontSize:13}}>🔍</span>
          <input className="msel" style={{paddingLeft:32,width:'100%'}} placeholder="Search…" value={sq} onChange={e=>setSq(e.target.value)}/>
        </div>
      </div>

      {/* Stats */}
      <div className="g4" style={{marginBottom:14}}>
        <div className="crd" style={{textAlign:'center',padding:13}}><div style={{fontSize:22,fontWeight:900,color:'var(--sa)'}}>{stats.total}</div><div style={{fontSize:10,color:'var(--ts)',marginTop:3}}>Total</div></div>
        <div className="crd" style={{textAlign:'center',padding:13}}><div style={{fontSize:22,fontWeight:900,color:'var(--em)'}}>{stats.paid}</div><div style={{fontSize:10,color:'var(--ts)',marginTop:3}}>✅ Paid</div></div>
        <div className="crd" style={{textAlign:'center',padding:13}}><div style={{fontSize:22,fontWeight:900,color:'var(--g)'}}>{stats.partial}</div><div style={{fontSize:10,color:'var(--ts)',marginTop:3}}>⚠️ Partial</div></div>
        <div className="crd" style={{textAlign:'center',padding:13}}><div style={{fontSize:22,fontWeight:900,color:'var(--rb)'}}>{stats.unpaid}</div><div style={{fontSize:10,color:'var(--ts)',marginTop:3}}>❌ Unpaid</div></div>
      </div>

      {/* Totals row */}
      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
        <div className="crd" style={{flex:1,padding:'9px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{color:'var(--ts)',fontSize:12}}>Total Due</span>
          <span style={{fontSize:17,fontWeight:900,color:'var(--ro)'}}>{fmt(stats.due)}</span>
        </div>
        <div className="crd" style={{flex:1,padding:'9px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{color:'var(--ts)',fontSize:12}}>Collected</span>
          <span style={{fontSize:17,fontWeight:900,color:'var(--em)'}}>{fmt(stats.coll)}</span>
        </div>
        <div className="crd" style={{flex:1,padding:'9px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{color:'var(--ts)',fontSize:12}}>Remaining</span>
          <span style={{fontSize:17,fontWeight:900,color:'var(--rb)'}}>{fmt(stats.due-stats.coll)}</span>
        </div>
      </div>

      {/* Table */}
      <div className="crd" style={{padding:0,overflow:'hidden'}}>
        <div className="tbw">
          <table className="tbl">
            <thead>
              <tr>
                <th>#</th><th>Member</th><th>Location</th>
                <th>Chitti</th><th>RD</th><th>Total</th>
                <th>Paid</th><th>Status</th><th>Action</th>
              </tr>
            </thead>
            <tbody>
              {rows.length===0
                ?<tr><td colSpan={9} style={{textAlign:'center',padding:36,color:'var(--ts)'}}>No members</td></tr>
                :rows.map((r,i)=>{
                  const pa=r.pay?Number(r.pay.chittiAmount||0)+Number(r.pay.rdAmount||0):0;
                  return(
                    <tr key={r.member.id}>
                      <td style={{color:'var(--ts)',fontSize:11}}>{i+1}</td>
                      <td>
                        <div style={{fontWeight:700,color:'var(--g)',fontSize:12,cursor:'pointer'}} onClick={()=>nav('detail',r.member.id)}>{cap(r.member.name)}</div>
                        {r.member.nickname&&<div style={{fontSize:10,color:'var(--tl)'}}>{r.member.nickname}</div>}
                      </td>
                      <td style={{color:'var(--ts)',fontSize:11}}>{r.member.location||'—'}</td>
                      <td style={{color:'var(--sa)',fontWeight:600,fontSize:12}}>{fmt(r.cd)}</td>
                      <td style={{color:'var(--vi)',fontWeight:600,fontSize:12}}>{fmt(r.rd2)}</td>
                      <td style={{color:'var(--g)',fontWeight:800,fontSize:13}}>{fmt(r.tot)}</td>
                      <td style={{color:pa>0?'var(--em)':'var(--ts)',fontWeight:600,fontSize:12}}>{pa>0?fmt(pa):'—'}</td>
                      <td>
                        <span className={`bdg bdg-${r.st==='paid'?'p':r.st==='partial'?'pt':'u'}`}>
                          {r.st==='paid'?'✅':r.st==='partial'?'⚠️':'❌'}&nbsp;{r.st.charAt(0).toUpperCase()+r.st.slice(1)}
                        </span>
                      </td>
                      <td><button className="btn btn-o btn-xs" onClick={()=>setER(r)}>Update</button></td>
                    </tr>
                  );
                })
              }
            </tbody>
          </table>
        </div>
      </div>

      {editRow&&<PMdl row={editRow} month={sel} onSave={(s,a,b)=>savePay(editRow.member.id,s,a,b)} onClose={()=>setER(null)}/>}
    </div>
  );
}

/* ─── Payment Update Modal ───────────────────────────── */
function PMdl({row,month,onSave,onClose}){
  const [st,sSt]=useState(row.pay?.status||'unpaid');
  const [ca,sCa]=useState(String(row.pay?.chittiAmount||''));
  const [ra,sRa]=useState(String(row.pay?.rdAmount||''));
  const pt=Number(ca||0)+Number(ra||0);
  return(
    <div className="ov" onClick={onClose}>
      <div className="mdl" onClick={e=>e.stopPropagation()}>
        <div className="mdl-t">💸 Update Payment</div>
        <div style={{display:'flex',alignItems:'center',gap:11,marginBottom:16}}>
          <div style={{width:38,height:38,borderRadius:10,background:'rgba(240,180,41,.15)',border:'1px solid var(--bdb)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,color:'var(--g)',fontSize:13,flexShrink:0}}>{ini(row.member.name)}</div>
          <div>
            <div style={{fontWeight:700,color:'var(--g)',fontSize:15}}>{cap(row.member.name)}</div>
            <div style={{fontSize:11,color:'var(--ts)'}}>{mLbl(month)} · Due: {fmt(row.tot)}</div>
          </div>
        </div>
        <div className="fg">
          <label className="fl">Chitti Paid (₹) <span style={{color:'var(--ts)',fontWeight:400,textTransform:'none',letterSpacing:0}}>due: {fmt(row.cd)}</span></label>
          <input className="fi" type="number" value={ca} onChange={e=>sCa(e.target.value)} placeholder="0"/>
        </div>
        <div className="fg">
          <label className="fl">RD Paid (₹) <span style={{color:'var(--ts)',fontWeight:400,textTransform:'none',letterSpacing:0}}>due: {fmt(row.rd2)}</span></label>
          <input className="fi" type="number" value={ra} onChange={e=>sRa(e.target.value)} placeholder="0"/>
        </div>
        <div className="fg" style={{marginBottom:8}}>
          <label className="fl">Status</label>
          <select className="fi" value={st} onChange={e=>sSt(e.target.value)}>
            <option value="paid">✅ Paid</option>
            <option value="partial">⚠️ Partial</option>
            <option value="unpaid">❌ Unpaid</option>
          </select>
        </div>
        {pt>0&&(
          <div style={{marginBottom:14,padding:'8px 11px',background:'rgba(6,214,160,.08)',borderRadius:8,fontSize:12}}>
            <span style={{color:'var(--ts)'}}>Recording: </span>
            <span className="te" style={{fontWeight:700}}>{fmt(pt)}</span>
            {pt<row.tot&&<span className="tr2" style={{fontSize:11,marginLeft:8}}>Balance: {fmt(row.tot-pt)}</span>}
          </div>
        )}
        <div className="mdl-a">
          <button className="btn btn-gh btn-f" onClick={onClose}>Cancel</button>
          <button className="btn btn-g btn-f" onClick={()=>onSave(st,ca,ra)}>Save</button>
        </div>
      </div>
    </div>
  );
}

/* ─── App Root ───────────────────────────────────────── */
function App(){
  const [pg,sPg]=useState('dash');
  const [dt,sDt]=useState(null);
  const [ntf,sNtf]=useState(null);
  const [showReminder,setSR]=useState(false);
  const [showEditMsg,setSEM]=useState(false);
  const [rk,sRk]=useState(0);

  const nav=useCallback((p,d=null)=>{
    sPg(p);sDt(d);sRk(k=>k+1);
    window.scrollTo({top:0,behavior:'smooth'});
  },[]);

  const notify=useCallback(n=>sNtf(n),[]);

  const openReminder=useCallback(()=>setSR(true),[]);
  const openEditMsg=useCallback(()=>setSEM(true),[]);

  return(
    <>
      <Hdr nav={nav} pg={pg} onReminder={openReminder} onEditMsg={openEditMsg}/>
      {pg==='dash'   &&<Dash    key={`dash-${rk}`}   nav={nav}/>}
      {pg==='add'    &&<MForm   key={`add-${rk}`}    memberId={null} nav={nav} notify={notify}/>}
      {pg==='edit'   &&<MForm   key={`edit-${rk}`}   memberId={dt}  nav={nav} notify={notify}/>}
      {pg==='detail' &&<MDetail key={`detail-${rk}`} memberId={dt}  nav={nav} notify={notify}/>}
      {pg==='monthly'&&<Monthly key={`monthly-${rk}`}              nav={nav} notify={notify}/>}
      {showReminder&&<ReminderModal onClose={()=>setSR(false)} notify={notify}/>}
      {showEditMsg &&<EditMsgModal  onClose={()=>setSEM(false)} notify={notify}/>}
      <Ntf n={ntf} onClose={()=>sNtf(null)}/>
    </>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>

<style>
:root{

  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--g),var(--am));
  display:flex;align-items:center;justify-content:center;

}
.sb-logo-n{
  font-size:14px;font-weight:800;
  background:linear-gradient(90deg,var(--gl),var(--g));

}

.sb-lbl{
  font-size:10px;font-weight:700;color:var(--tm);
  text-transform:uppercase;letter-spacing:1.5px;
  padding:8px 12px 4px;
}
.sb-item{

  transition:all .2s;border:1px solid transparent;

.sb-div{height:1px;background:var(--bd);margin:6px 0}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;border-radius:9px;border:none;cursor:pointer;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:600;

}
.btn:hover{transform:translateY(-1px)}.btn:active{transform:translateY(0)}
.btn-g{background:linear-gradient(135deg,var(--g),var(--am));color:#080810;box-shadow:0 4px 14px rgba(240,180,41,.3)}

.crd-ro{border-color:rgba(255,107,157,.3)}

}

.sc-gl{position:absolute;top:-25px;right:-25px;width:90px;height:90px;border-radius:50%;filter:blur(30px);opacity:.35}

/* Member Card */
.mc{
  background:var(--bgc);border:1px solid var(--bd);

  return(p&&p!=='N/A')?p:null;

/* ─── Notification ───────────────────────────────────── */
function Ntf({n,onClose}){
  useEffect(()=>{
    if(!n)return;
    const t=setTimeout(onClose,3500);
    return()=>clearTimeout(t);
  },[n,onClose]);
  if(!n)return null;
  const icon=n.t==='success'?'✅':n.t==='error'?'❌':'ℹ️';
  return<div className={`ntf ntf-${n.t==='success'?'s':n.t==='error'?'e':'i'}`}><span>{icon}</span><span>{n.m}</span></div>;
}

/* ─── Reminder Modal ─────────────────────────────────── */
function ReminderModal({onClose,notify}){
  const allMembers=DB.g('members');
  const chittis=DB.g('chittis');
  const rd=DB.g('rdEntries');
  const payments=DB.g('payments');
  const cMonth=curM();

  const activeMembers=allMembers.filter(m=>m.status==='active');
  const withPhone=activeMembers.filter(m=>m.phone&&m.phone.replace(/\D/g,'').length>=10);
  const noPhone=activeMembers.filter(m=>!m.phone||m.phone.replace(/\D/g,'').length<10);

  const [selected,setSel]=useState(()=>new Set(withPhone.map(m=>m.id)));
  const [sending,setSending]=useState(false);
  const [sent,setSent]=useState(new Set());
  const [search,setSearch]=useState('');

  const ct=mId=>chittis.filter(c=>c.memberId===mId).reduce((s,c)=>s+Number(c.amount||0),0);
  const rt=mId=>rd.filter(r=>r.memberId===mId).reduce((s,r)=>s+Number(r.amount||0),0);
  const isPaid=mId=>{
    const p=payments.find(pp=>pp.memberId===mId&&pp.month===cMonth);
    return p&&p.status==='paid';
  };

  const unpaidWithPhone=withPhone.filter(m=>!isPaid(m.id));

  const toggle=id=>{
    if(sending)return;
    setSel(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n});
  };

  const filtered=useMemo(()=>{
    const lq=search.toLowerCase().trim();
    if(!lq)return withPhone;
    return withPhone.filter(m=>
      m.name.toLowerCase().includes(lq)||
      (m.nickname||'').toLowerCase().includes(lq)||
      (m.location||'').toLowerCase().includes(lq)
    );
  },[withPhone,search]);

  const sendAll=async()=>{
    const toSend=[...selected].map(id=>withPhone.find(m=>m.id===id)).filter(Boolean);
    if(!toSend.length)return;
    setSending(true);
    for(let i=0;i<toSend.length;i++){
      const m=toSend[i];
      const ph=m.phone.replace(/\D/g,'');
      const msg=buildMsg(m,chittis,rd);
      window.open(`https://wa.me/91${ph}?text=${encodeURIComponent(msg)}`,'_blank');
      setSent(prev=>new Set([...prev,m.id]));
      if(i<toSend.length-1)await new Promise(r=>setTimeout(r,1500));
    }
    setSending(false);
    notify({t:'success',m:`Sent to ${toSend.length} member${toSend.length>1?'s':''}!`});
  };

  return(
    <div className="ov" onClick={onClose}>
      <div className="mdl mdl-lg" onClick={e=>e.stopPropagation()}>
        <div className="mdl-t">📢 Send Payment Reminders</div>
        <p style={{fontSize:12,color:'var(--ts)',marginBottom:14,lineHeight:1.6}}>
          Only active members with phone numbers shown. Chitti periods auto-included.
        </p>
        {/* Quick select */}
        <div style={{display:'flex',gap:7,marginBottom:13,flexWrap:'wrap'}}>
          <button className="btn btn-g btn-xs" onClick={()=>setSel(new Set(withPhone.map(m=>m.id)))}>All ({withPhone.length})</button>
          <button className="btn btn-sa btn-xs" onClick={()=>setSel(new Set(unpaidWithPhone.map(m=>m.id)))}>Unpaid ({unpaidWithPhone.length})</button>
          <button className="btn btn-gh btn-xs" onClick={()=>setSel(new Set())}>None</button>
        </div>
        {/* Search */}
        <div className="swrp" style={{marginBottom:12}}>
          <span className="sico">🔍</span>
          <input className="sinp" style={{padding:'9px 13px 9px 40px',fontSize:13}} placeholder="Search…" value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        {/* Count */}
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:10,fontSize:12}}>
          <span style={{color:'var(--ts)'}}>
            📱 {withPhone.length} with phone &nbsp;|&nbsp;
            <span style={{color:'var(--g)',fontWeight:700}}>{selected.size} selected</span>
          </span>
          {noPhone.length>0&&<span style={{color:'var(--rb)'}}>{noPhone.length} no phone</span>}
        </div>
        {/* List */}
        <div style={{maxHeight:'38vh',overflowY:'auto',display:'flex',flexDirection:'column',gap:5,marginBottom:14,paddingRight:3}}>
          {filtered.length===0
            ?<div className="emp" style={{padding:24}}><div className="emp-t">No members found</div></div>
            :filtered.map(m=>{
              const isOn=selected.has(m.id);
              const isSent=sent.has(m.id);
              const paid=isPaid(m.id);
              const total=ct(m.id)+rt(m.id);
              return(
                <div key={m.id} className={`rem-item ${isOn?'sel':''}`} onClick={()=>toggle(m.id)}>
                  <div className={`chk ${isOn?'on':''}`}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:'flex',alignItems:'center',gap:7,flexWrap:'wrap'}}>
                      <span style={{fontWeight:700,fontSize:13,color:isOn?'var(--g)':'var(--tp)'}}>{cap(m.name)}</span>
                      {m.location&&<span style={{fontSize:11,color:'var(--ts)'}}>📍{m.location}</span>}
                      {paid&&<span className="bdg bdg-p" style={{fontSize:9}}>Paid</span>}
                      {isSent&&<span className="bdg bdg-a" style={{fontSize:9}}>✅Sent</span>}
                    </div>
                    <div style={{fontSize:11,color:'var(--ts)',marginTop:2}}>
                      📞{m.phone} &nbsp;·&nbsp; <span style={{color:'var(--g)',fontWeight:600}}>{fmt(total)}</span>
                    </div>
                  </div>
                </div>
              );
            })
          }
        </div>
        {sending&&(
          <div className="sending">
            <div className="sd-dot"/>
            <span>Sending… ({sent.size}/{selected.size})</span>
          </div>
        )}
        <div className="mdl-a">
          <button className="btn btn-gh btn-f" onClick={onClose} disabled={sending}>Close</button>
          <button
            className={`btn btn-w btn-f ${selected.size===0||sending?'btn-dis':''}`}
            onClick={sendAll}
          >
            💬 Send ({selected.size})
          </button>
        </div>
        {noPhone.length>0&&(
          <details style={{marginTop:12}}>
            <summary style={{fontSize:11,color:'var(--ts)',cursor:'pointer'}}>⚠️ {noPhone.length} without phone</summary>
            <div style={{marginTop:7,display:'flex',flexWrap:'wrap',gap:5}}>
              {noPhone.map(m=>(
                <span key={m.id} style={{fontSize:11,padding:'2px 7px',background:'rgba(239,35,60,.08)',border:'1px solid rgba(239,35,60,.2)',borderRadius:5,color:'var(--rb)'}}>{cap(m.name)}</span>
              ))}
            </div>
          </details>
        )}
      </div>
    </div>
  );
}

/* ─── Member Form ────────────────────────────────────── */
function MForm({memberId,nav,notify}){
  const isE=!!memberId;
  const [f,sF]=useState({name:'',nickname:'',phone:'',location:'',notes:'',status:'active'});
  const [ch,sCh]=useState([{num:'1',amt:''}]);
  const [ra,sRa]=useState('');
  const [er,sEr]=useState({});
  const [dm,sDm]=useState(false);

  useEffect(()=>{
    if(!isE)return;
    const m=DB.g('members').find(x=>x.id===memberId);
    if(!m)return;
    sF({name:m.name,nickname:m.nickname||'',phone:m.phone||'',location:m.location||'',notes:m.notes||'',status:m.status});
    const cs=DB.g('chittis').filter(x=>x.memberId===memberId);
    sCh(cs.length?cs.map(x=>({num:String(x.chittiNumber),amt:String(x.amount)})):[{num:'1',amt:''}]);
    const r=DB.g('rdEntries').find(x=>x.memberId===memberId);
    sRa(r?String(r.amount):'');
  },[memberId,isE]);

  const val=()=>{
    const e={};
    if(!f.name.trim())e.name='Required';
    if(f.phone&&!/^\d{10}$/.test(f.phone.replace(/\s/g,'')))e.phone='Must be 10 digits';
    ch.forEach((c,i)=>{if(c.amt&&(isNaN(Number(c.amt))||Number(c.amt)<=0))e[`c${i}`]='Invalid amount'});
    if(ra&&(isNaN(Number(ra))||Number(ra)<=0))e.rd='Invalid amount';
    sEr(e);
    return!Object.keys(e).length;
  };

  const save=()=>{
    if(!val())return;
    const now=new Date().toISOString();
    if(isE){
      DB.s('members',DB.g('members').map(m=>m.id===memberId?{...m,...f,updatedAt:now}:m));
      let aC=DB.g('chittis').filter(c=>c.memberId!==memberId);
      ch.filter(c=>c.amt&&Number(c.amt)>0).forEach((c,i)=>aC.push({id:Date.now()+i,memberId,chittiNumber:c.num||String(i+1),amount:Number(c.amt),createdAt:now}));
      DB.s('chittis',aC);
      let aR=DB.g('rdEntries').filter(r=>r.memberId!==memberId);
      if(ra&&Number(ra)>0)aR.push({id:Date.now(),memberId,amount:Number(ra),createdAt:now});
      DB.s('rdEntries',aR);
      notify({t:'success',m:'Member updated!'});
      nav('detail',memberId);
    }else{
      const nid=DB.nid('members');
      DB.s('members',[...DB.g('members'),{id:nid,...f,name:cap(f.name.trim()),createdAt:now}]);
      let aC=DB.g('chittis');
      ch.filter(c=>c.amt&&Number(c.amt)>0).forEach((c,i)=>aC.push({id:Date.now()+i,memberId:nid,chittiNumber:c.num||String(i+1),amount:Number(c.amt),createdAt:now}));
      DB.s('chittis',aC);
      let aR=DB.g('rdEntries');
      if(ra&&Number(ra)>0)aR.push({id:Date.now(),memberId:nid,amount:Number(ra),createdAt:now});
      DB.s('rdEntries',aR);
      notify({t:'success',m:'Member added!'});
      nav('dash');
    }
  };

  const del=()=>{

/* ─── Monthly Summary ────────────────────────────────── */
function Monthly({nav,notify}){
  const [sel,setSel]=useState(curM());
  const [members,setM]=useState([]);
  const [chittis,setC]=useState([]);
  const [rd,setR]=useState([]);
  const [payments,setP]=useState([]);
  const [sort,setSort]=useState('name');
  const [editRow,setER]=useState(null);
  const [sq,setSq]=useState('');

  useEffect(()=>{
    const sync=()=>{
      setM(DB.g('members').filter(m=>m.status==='active'));
      setC(DB.g('chittis'));
      setR(DB.g('rdEntries'));
      setP(DB.g('payments'));
    };
    sync();
    window.addEventListener('focus',sync);
    return()=>window.removeEventListener('focus',sync);
  },[]);

  const months=useMemo(()=>{
    const r=[];const n=new Date();
    for(let i=0;i<24;i++){
      const d=new Date(n.getFullYear(),n.getMonth()-i,1);
      r.push(d.toISOString().slice(0,7));
    }
    return r;
  },[]);

  const ct=mId=>chittis.filter(c=>c.memberId===mId).reduce((s,c)=>s+Number(c.amount||0),0);
  const rt=mId=>rd.filter(r=>r.memberId===mId).reduce((s,r)=>s+Number(r.amount||0),0);

  const rows=useMemo(()=>{
    const lq=sq.toLowerCase().trim();
    let r=members
      .filter(m=>!lq||(
        m.name.toLowerCase().includes(lq)||
        (m.location||'').toLowerCase().includes(lq)||
        (m.nickname||'').toLowerCase().includes(lq)
      ))
      .map(m=>{
        const p=payments.find(pp=>pp.memberId===m.id&&pp.month===sel);
        const cd=ct(m.id),rd2=rt(m.id),tot=cd+rd2;
        const st=p?p.status:'unpaid';
        return{member:m,cd,rd2,tot,pay:p,st};
      });
    if(sort==='name')r.sort((a,b)=>a.member.name.localeCompare(b.member.name));
    else if(sort==='status'){const o={paid:0,partial:1,unpaid:2};r.sort((a,b)=>o[a.st]-o[b.st])}
    else if(sort==='amt')r.sort((a,b)=>b.tot-a.tot);
    return r;
  },[members,chittis,rd,payments,sel,sort,sq]);

  const stats=useMemo(()=>({
    total:rows.length,
    paid:rows.filter(r=>r.st==='paid').length,
    partial:rows.filter(r=>r.st==='partial').length,
    unpaid:rows.filter(r=>r.st==='unpaid').length,
    coll:rows.reduce((s,r)=>s+(r.pay?Number(r.pay.chittiAmount||0)+Number(r.pay.rdAmount||0):0),0),
    due:rows.reduce((s,r)=>s+r.tot,0),
  }),[rows]);

  const savePay=(mId,status,ca,ra2)=>{
    let all=DB.g('payments');
    const ex=all.find(p=>p.memberId===mId&&p.month===sel);
    if(ex){
      all=all.map(p=>p.id===ex.id?{...p,status,chittiAmount:Number(ca||0),rdAmount:Number(ra2||0),updatedAt:new Date().toISOString()}:p);
    }else{
      all.push({id:Date.now(),memberId:mId,month:sel,chittiAmount:Number(ca||0),rdAmount:Number(ra2||0),status,createdAt:new Date().toISOString()});
    }
    DB.s('payments',all);
    setP(DB.g('payments'));
    setER(null);
    notify({t:'success',m:'Payment updated!'});
  };

  return(
    <div className="pg">
      <button className="bk" onClick={()=>nav('dash')}>← Dashboard</button>
      <div style={{margin:'14px 0 20px'}}>
        <h1 style={{fontSize:22,fontWeight:800}} className="tgg">Monthly Summary</h1>
      </div>

      {/* Controls */}
      <div style={{display:'flex',gap:9,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
        <select className="msel" value={sel} onChange={e=>setSel(e.target.value)}>
          {months.map(m=><option key={m} value={m}>{mLbl(m)}</option>)}
        </select>
        <select className="msel" value={sort} onChange={e=>setSort(e.target.value)}>
          <option value="name">A–Z</option>
          <option value="status">By Status</option>
          <option value="amt">By Amount</option>
        </select>
        <div style={{flex:1,minWidth:150,position:'relative'}}>
          <span style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'var(--ts)',fontSize:13}}>🔍</span>
          <input className="msel" style={{paddingLeft:32,width:'100%'}} placeholder="Search…" value={sq} onChange={e=>setSq(e.target.value)}/>
        </div>
      </div>

      {/* Stats */}
      <div className="g4" style={{marginBottom:14}}>
        <div className="crd" style={{textAlign:'center',padding:13}}><div style={{fontSize:22,fontWeight:900,color:'var(--sa)'}}>{stats.total}</div><div style={{fontSize:10,color:'var(--ts)',marginTop:3}}>Total</div></div>
        <div className="crd" style={{textAlign:'center',padding:13}}><div style={{fontSize:22,fontWeight:900,color:'var(--em)'}}>{stats.paid}</div><div style={{fontSize:10,color:'var(--ts)',marginTop:3}}>✅ Paid</div></div>
        <div className="crd" style={{textAlign:'center',padding:13}}><div style={{fontSize:22,fontWeight:900,color:'var(--g)'}}>{stats.partial}</div><div style={{fontSize:10,color:'var(--ts)',marginTop:3}}>⚠️ Partial</div></div>
        <div className="crd" style={{textAlign:'center',padding:13}}><div style={{fontSize:22,fontWeight:900,color:'var(--rb)'}}>{stats.unpaid}</div><div style={{fontSize:10,color:'var(--ts)',marginTop:3}}>❌ Unpaid</div></div>
      </div>

      {/* Totals row */}
      <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
        <div className="crd" style={{flex:1,padding:'9px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{color:'var(--ts)',fontSize:12}}>Total Due</span>
          <span style={{fontSize:17,fontWeight:900,color:'var(--ro)'}}>{fmt(stats.due)}</span>
        </div>
        <div className="crd" style={{flex:1,padding:'9px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{color:'var(--ts)',fontSize:12}}>Collected</span>
          <span style={{fontSize:17,fontWeight:900,color:'var(--em)'}}>{fmt(stats.coll)}</span>
        </div>
        <div className="crd" style={{flex:1,padding:'9px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{color:'var(--ts)',fontSize:12}}>Remaining</span>
          <span style={{fontSize:17,fontWeight:900,color:'var(--rb)'}}>{fmt(stats.due-stats.coll)}</span>
        </div>
      </div>

      {/* Table */}
      <div className="crd" style={{padding:0,overflow:'hidden'}}>
        <div className="tbw">
          <table className="tbl">
            <thead>
              <tr>
                <th>#</th><th>Member</th><th>Location</th>
                <th>Chitti</th><th>RD</th><th>Total</th>
                <th>Paid</th><th>Status</th><th>Action</th>
              </tr>
            </thead>
            <tbody>
              {rows.length===0
                ?<tr><td colSpan={9} style={{textAlign:'center',padding:36,color:'var(--ts)'}}>No members</td></tr>
                :rows.map((r,i)=>{
                  const pa=r.pay?Number(r.pay.chittiAmount||0)+Number(r.pay.rdAmount||0):0;
                  return(
                    <tr key={r.member.id}>
                      <td style={{color:'var(--ts)',fontSize:11}}>{i+1}</td>
                      <td>
                        <div style={{fontWeight:700,color:'var(--g)',fontSize:12,cursor:'pointer'}} onClick={()=>nav('detail',r.member.id)}>{cap(r.member.name)}</div>
                        {r.member.nickname&&<div style={{fontSize:10,color:'var(--tl)'}}>{r.member.nickname}</div>}
                      </td>
                      <td style={{color:'var(--ts)',fontSize:11}}>{r.member.location||'—'}</td>
                      <td style={{color:'var(--sa)',fontWeight:600,fontSize:12}}>{fmt(r.cd)}</td>
                      <td style={{color:'var(--vi)',fontWeight:600,fontSize:12}}>{fmt(r.rd2)}</td>
                      <td style={{color:'var(--g)',fontWeight:800,fontSize:13}}>{fmt(r.tot)}</td>
                      <td style={{color:pa>0?'var(--em)':'var(--ts)',fontWeight:600,fontSize:12}}>{pa>0?fmt(pa):'—'}</td>
                      <td>
                        <span className={`bdg bdg-${r.st==='paid'?'p':r.st==='partial'?'pt':'u'}`}>
                          {r.st==='paid'?'✅':r.st==='partial'?'⚠️':'❌'}&nbsp;{r.st.charAt(0).toUpperCase()+r.st.slice(1)}
                        </span>
                      </td>
                      <td><button className="btn btn-o btn-xs" onClick={()=>setER(r)}>Update</button></td>
                    </tr>
                  );
                })
              }
            </tbody>
          </table>
        </div>
      </div>

      {editRow&&<PMdl row={editRow} month={sel} onSave={(s,a,b)=>savePay(editRow.member.id,s,a,b)} onClose={()=>setER(null)}/>}
    </div>
  );
}

/* ─── Payment Update Modal ───────────────────────────── */
function PMdl({row,month,onSave,onClose}){
  const [st,sSt]=useState(row.pay?.status||'unpaid');
  const [ca,sCa]=useState(String(row.pay?.chittiAmount||''));
  const [ra,sRa]=useState(String(row.pay?.rdAmount||''));
  const pt=Number(ca||0)+Number(ra||0);
  return(
    <div className="ov" onClick={onClose}>
      <div className="mdl" onClick={e=>e.stopPropagation()}>
        <div className="mdl-t">💸 Update Payment</div>
        <div style={{display:'flex',alignItems:'center',gap:11,marginBottom:16}}>
          <div style={{width:38,height:38,borderRadius:10,background:'rgba(240,180,41,.15)',border:'1px solid var(--bdb)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:800,color:'var(--g)',fontSize:13,flexShrink:0}}>{ini(row.member.name)}</div>
          <div>
            <div style={{fontWeight:700,color:'var(--g)',fontSize:15}}>{cap(row.member.name)}</div>
            <div style={{fontSize:11,color:'var(--ts)'}}>{mLbl(month)} · Due: {fmt(row.tot)}</div>
          </div>
        </div>
        <div className="fg">
          <label className="fl">Chitti Paid (₹) <span style={{color:'var(--ts)',fontWeight:400,textTransform:'none',letterSpacing:0}}>due: {fmt(row.cd)}</span></label>
          <input className="fi" type="number" value={ca} onChange={e=>sCa(e.target.value)} placeholder="0"/>
        </div>
        <div className="fg">
          <label className="fl">RD Paid (₹) <span style={{color:'var(--ts)',fontWeight:400,textTransform:'none',letterSpacing:0}}>due: {fmt(row.rd2)}</span></label>
          <input className="fi" type="number" value={ra} onChange={e=>sRa(e.target.value)} placeholder="0"/>
        </div>
        <div className="fg" style={{marginBottom:8}}>
          <label className="fl">Status</label>
          <select className="fi" value={st} onChange={e=>sSt(e.target.value)}>
            <option value="paid">✅ Paid</option>
            <option value="partial">⚠️ Partial</option>
            <option value="unpaid">❌ Unpaid</option>
          </select>
        </div>
        {pt>0&&(
          <div style={{marginBottom:14,padding:'8px 11px',background:'rgba(6,214,160,.08)',borderRadius:8,fontSize:12}}>
            <span style={{color:'var(--ts)'}}>Recording: </span>
            <span className="te" style={{fontWeight:700}}>{fmt(pt)}</span>
            {pt<row.tot&&<span className="tr2" style={{fontSize:11,marginLeft:8}}>Balance: {fmt(row.tot-pt)}</span>}
          </div>
        )}
        <div className="mdl-a">
          <button className="btn btn-gh btn-f" onClick={onClose}>Cancel</button>
          <button className="btn btn-g btn-f" onClick={()=>onSave(st,ca,ra)}>Save</button>
        </div>
      </div>
    </div>
  );
}

/* ─── App Root ───────────────────────────────────────── */
function App(){
  const [pg,sPg]=useState('dash');
  const [dt,sDt]=useState(null);
  const [ntf,sNtf]=useState(null);
  const [showReminder,setSR]=useState(false);
  const [showEditMsg,setSEM]=useState(false);
  const [rk,sRk]=useState(0);

  const nav=useCallback((p,d=null)=>{
    sPg(p);sDt(d);sRk(k=>k+1);
    window.scrollTo({top:0,behavior:'smooth'});
  },[]);

  const notify=useCallback(n=>sNtf(n),[]);

  const openReminder=useCallback(()=>setSR(true),[]);
  const openEditMsg=useCallback(()=>setSEM(true),[]);

  return(
    <>
      <Hdr nav={nav} pg={pg} onReminder={openReminder} onEditMsg={openEditMsg}/>
      {pg==='dash'   &&<Dash    key={`dash-${rk}`}   nav={nav}/>}
      {pg==='add'    &&<MForm   key={`add-${rk}`}    memberId={null} nav={nav} notify={notify}/>}
      {pg==='edit'   &&<MForm   key={`edit-${rk}`}   memberId={dt}  nav={nav} notify={notify}/>}
      {pg==='detail' &&<MDetail key={`detail-${rk}`} memberId={dt}  nav={nav} notify={notify}/>}
      {pg==='monthly'&&<Monthly key={`monthly-${rk}`}              nav={nav} notify={notify}/>}
      {showReminder&&<ReminderModal onClose={()=>setSR(false)} notify={notify}/>}
      {showEditMsg &&<EditMsgModal  onClose={()=>setSEM(false)} notify={notify}/>}
      <Ntf n={ntf} onClose={()=>sNtf(null)}/>
    </>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
